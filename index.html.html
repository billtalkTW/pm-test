CH17-030","category":"IPMA自我評量","source":"Chapter 17 專案結束.pdf","section":"Chapter 17","originalNo":"30","question":"在興建101 大樓的包商所提供的物品和服務,經過了國家專案團隊的檢驗無 誤,並且提供正式允許簽字後,合約就正式結束。合約要結束不須通過哪個 方法?","options":[{"letter":"A","text":"輸入"},{"letter":"B","text":"限制及假設"},{"letter":"C","text":"方法"},{"letter":"D","text":"產出"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 產出","answerSource":"原檔解答","note":"(A)(B)(C)皆正確 (D)錯誤 因為產出是合約結束後,才有的。"},{"id":"IPMA-CH18-001","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"1","question":"專案管理成熟度即(PMM)它是用來衡量什麼的能力等級,也是組織專案管理 方法、決策能力逐步發展的一個過程?","options":[{"letter":"A","text":"專案"},{"letter":"B","text":"組織執行專案"},{"letter":"C","text":"專案管理"},{"letter":"D","text":"專案經理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 組織執行專案","answerSource":"原檔解答","note":"課本P.205 專案管理成熟度即(PMM)是用來衡量組織執行專案的能力等級,也是組織專 案管理方法、決策能力逐步發展的一個過程。"},{"id":"IPMA-CH18-002","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"2","question":"專案的執行績效受到三個主要因素影響其中何者不是?","options":[{"letter":"A","text":"專案成員"},{"letter":"B","text":"專案進度"},{"letter":"C","text":"專案管理流程"},{"letter":"D","text":"專案管理I T 技術"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案進度","answerSource":"原檔解答","note":"課本P.205 專案的執行績效受到三個主要因素影響為 1.專案成員 2.專案管理流程 3.專案管理I T 技術。"},{"id":"IPMA-CH18-003","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"3","question":"下列哪個專案管理成熟度模式順序何者正確?","options":[{"letter":"A","text":"專案手法→各自為政→統一流程→持續改善→量化衡量"},{"letter":"B","text":"各自為政→專案手法→統一流程→量化衡量→持續改善"},{"letter":"C","text":"各自為政→專案手法→持續改善→量化衡量→統一流程"},{"letter":"D","text":"統一流程→量化衡量→專案手法→持續改善→各自為政"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 各自為政→專案手法→統一流程→量化衡量→持續改善","answerSource":"原檔解答","note":"課本P.205 圖18.1 表示 專案管理成熟度模式:各自為政→專案手法→統一流程→量化衡量→持續改 善。"},{"id":"IPMA-CH18-004","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"4","question":"統一流程是組織各部門使用相同的專案管理流程主要特徵不包含合者?","options":[{"letter":"A","text":"保留並使用舊案資料"},{"letter":"B","text":"使用通用的專案管理工具"},{"letter":"C","text":"使用一致的專案管理工具"},{"letter":"D","text":"有提供專案經理和成員的訓練"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 使用通用的專案管理工具","answerSource":"原檔解答","note":"課本P.206 統一流程的特徵為 1.高成主管支持專案管理 2.組織可以有效的的規劃、管理、整合和控制專案 3.保留並使用舊案資料 4.使用一致的專案管理工具 5.有提供專案經理和成員的訓練。"},{"id":"IPMA-CH18-005","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"5","question":"何者不是持續改善的定義之ㄧ?","options":[{"letter":"A","text":"高度鼓勵專案管理發法的改善"},{"letter":"B","text":"高度依賴專案經理的能力"},{"letter":"C","text":"彈性的專案管理組織"},{"letter":"D","text":"提供專案經理生涯規劃"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 高度依賴專案經理的能力","answerSource":"原檔解答","note":"課本P.207 的定義為 1.高度鼓勵專案管理發法的改善 2.彈性的專案管理組織 3.提供專案經理生涯規劃 4.將專案管理訓練是為員工能力發展的一環。"},{"id":"IPMA-CH18-006","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"6","question":"下列何者不是影響專案執行績效的因素?","options":[{"letter":"A","text":"專案成員"},{"letter":"B","text":"專案管理IT 技術"},{"letter":"C","text":"專案的好壞"},{"letter":"D","text":"專案管理流程"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案的好壞","answerSource":"原檔解答","note":"專案的執行績效壽到三個主要的因素影響,即專案成員,專案管理流程,專案管 理IT 技術. 專案管理的成熟度就是要檢視組織在這三方面綜合運作的效果 (P.205 第四行)。"},{"id":"IPMA-CH18-007","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"7","question":"專案管理的成熟度分為五級,請問下列何者為第一級(最下級)?","options":[{"letter":"A","text":"各自為政"},{"letter":"B","text":"量化衡量"},{"letter":"C","text":"統一流程"},{"letter":"D","text":"專案手法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 各自為政","answerSource":"原檔解答","note":"由於各自為政等級沒有正式的專案管理流程,所以為最下級。"},{"id":"IPMA-CH18-008","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"8","question":"下列何者為”各自為政”等級的主要特徵?","options":[{"letter":"A","text":"部門主管提供支持"},{"letter":"B","text":"彈性的專案管理組織"},{"letter":"C","text":"經驗教訓沒有留存"},{"letter":"D","text":"使用一致的專案管理工具"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 經驗教訓沒有留存","answerSource":"原檔解答","note":"因為各自為政並不是正式的專案管理。"},{"id":"IPMA-CH18-009","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"9","question":"請選出階級由”小至大”排列完全正確的選項?","options":[{"letter":"A","text":"專案手法>統一流程>持續改善>各自為政>量化衡量"},{"letter":"B","text":"持續改善>專案手法>各自為政>統一流程>量化衡量"},{"letter":"C","text":"各自為政>專案手法>統一流程>量化衡量>持續改善"},{"letter":"D","text":"量化衡量>統一流程>專案手法>各自為政>持續改善"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 各自為政>專案手法>統一流程>量化衡量>持續改善","answerSource":"原檔解答","note":"請見P.205 圖18.1。"},{"id":"IPMA-CH18-010","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"10","question":"下列何者為專案手法等級的主要特徵?","options":[{"letter":"A","text":"部門主管提供支持"},{"letter":"B","text":"專案結果稍可預測"},{"letter":"C","text":"使用通用的專案管理工具"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"已有使用專案管理手法,但是只侷限在各個部門,所以大步粉都只與部門內有 關。"},{"id":"IPMA-CH18-011","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"11","question":"專案的執行績效受到哪些主要因素影響?","options":[{"letter":"A","text":"專案經理、專案發起人、專案成員"},{"letter":"B","text":"專案成員、專案管理流程、專案管理IT 技術"},{"letter":"C","text":"專案管理流程、專案成員、專案經理"},{"letter":"D","text":"專案管理IT 技術、專案協理、專案發起人"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案成員、專案管理流程、專案管理IT 技術","answerSource":"原檔解答","note":"專案的執行績效受到三個主要因素影響,即專案成員、專案管理流程、專案 管理IT 技術。專案管理成熟度就是要檢視組織在這三方面綜合運作的效果。 (P.205)"},{"id":"IPMA-CH18-012","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"12","question":"專案管理成熟度模式順序為何?","options":[{"letter":"A","text":"各自為政→專案手法→統一流程→量化衡量→持續改善"},{"letter":"B","text":"專案手法→量化衡量→各自為政→統一流程→持續改善"},{"letter":"C","text":"統一流程→量化衡量→專案手法→各自為政→持續改善"},{"letter":"D","text":"量化衡量→各自為政→專案手法→統一流程→持續改善"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 各自為政→專案手法→統一流程→量化衡量→持續改善","answerSource":"原檔解答","note":"(P.205 圖18.1)。"},{"id":"IPMA-CH18-013","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"13","question":"組織專案管理方法、策略制定和決策能力逐步發展一個過程稱為?","options":[{"letter":"A","text":"專案手法"},{"letter":"B","text":"專案管理資訊系統"},{"letter":"C","text":"專案概念書"},{"letter":"D","text":"專案管理成熟度"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 專案管理成熟度","answerSource":"原檔解答","note":"專案管理成熟度(PMM)是用來衡量組織執行專案能力等級,也是組織專案管 理方法、策略制定和決策能力逐步發展的一個過程。(P.205)"},{"id":"IPMA-CH18-014","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"14","question":"何為專案手法的特徵?","options":[{"letter":"A","text":"高度依賴專案經理的能力"},{"letter":"B","text":"流程可在部門內重複應用"},{"letter":"C","text":"組織可以有效的規劃、管理、整合和控制專案"},{"letter":"D","text":"定義專案管理流程的關鍵績效指標"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 流程可在部門內重複應用","answerSource":"原檔解答","note":"專案手法的主要特徵有: 1.部門主管提供支持 2.流程可以在部門內重複應用 3.專案結果稍可預測 4.使用通用的專案管理工具 (P.206)"},{"id":"IPMA-CH18-015","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"15","question":"何為統一流程的特徵?","options":[{"letter":"A","text":"高度依賴專案經理的能力"},{"letter":"B","text":"流程可在部門內重複應用"},{"letter":"C","text":"組織可以有效的規劃、管理、整合和控制專案"},{"letter":"D","text":"定義專案管理流程的關鍵績效指標"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 組織可以有效的規劃、管理、整合和控制專案","answerSource":"原檔解答","note":"統一流程的特徵有: 1 高層主管支持專案管理 2 組織可以有效的規劃、管理、整合和控制專案 3 保留並使用舊案資料 4 有提供專案經理和成員 5 使用一致的專案管理工具"},{"id":"IPMA-CH18-016","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"16","question":"專案的執行績效受到三個主要因素的影響,何者為非?","options":[{"letter":"A","text":"專案成員"},{"letter":"B","text":"專案風險"},{"letter":"C","text":"專案管理流程"},{"letter":"D","text":"專案管理IT 技術"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案風險","answerSource":"原檔解答","note":"原因是專案風險並非是專案執行績效的主要影響因素,請參閱P205。"},{"id":"IPMA-CH18-017","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"17","question":"專案管理成熟度模式中的持續改善機制,下列特徵何者正確?","options":[{"letter":"A","text":"組織很少提供支持"},{"letter":"B","text":"部門主管提供支持"},{"letter":"C","text":"專案結果無法預測"},{"letter":"D","text":"高度鼓勵專案管理方法的改善"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 高度鼓勵專案管理方法的改善","answerSource":"原檔解答","note":"A. 不正確。原因是組織很少提供支持為各自為政的特徵。 B. 不正確。原因是部門主管提供支持為專案手法的特徵。 C. 不正確。原因是專案結果無法預測為各自為政的特徵。 D. 正確。請參閱P206。"},{"id":"IPMA-CH18-018","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"18","question":"組織以量化的方式衡量專案管理流程的績效,主要特徵有:","options":[{"letter":"A","text":"定義專案管理流程的關鍵績效指標"},{"letter":"B","text":"使用量化的工具來探討流程的績效"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 以上皆是","answerSource":"原檔解答","note":"原因是A、B 均為量化衡量的主要特徵,請參閱P206。"},{"id":"IPMA-CH18-019","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"19","question":"專案管理成熟度的英文簡稱,何者正確?","options":[{"letter":"A","text":"PMM - project management maturity"},{"letter":"B","text":"PMO - project management office"},{"letter":"C","text":"WBS - work breakdown structure"},{"letter":"D","text":"OBS - organization breakdown structure"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. PMM - project management maturity","answerSource":"原檔解答","note":"原因是專案管理成熟度的英文為PMM - project management maturity,請 參閱P205。"},{"id":"IPMA-CH18-020","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"20","question":"專案管理成熟度的統一流程,主要特徵何者有誤?","options":[{"letter":"A","text":"高層主管支持專案管理"},{"letter":"B","text":"有提供專案經理和成員的訓練"},{"letter":"C","text":"使用不同的專案管理工具"},{"letter":"D","text":"保留並使用舊案資料"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 使用不同的專案管理工具","answerSource":"原檔解答","note":"原因是使用一致的專案管理工具,請參閱P206。"},{"id":"IPMA-CH18-021","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"21","question":"PMM 是用來?","options":[{"letter":"A","text":"衡量組織執行專案的能力等級"},{"letter":"B","text":"組織專案管理方法,策略制定和決策能力逐步發展的一個過程"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 以上皆是","answerSource":"原檔解答","note":"PMM 是用來衡量組織執行專案的能力等級及組織專案管理方法,策略制定和 決策能力逐步發展的一個過程。請參閱P205"},{"id":"IPMA-CH18-022","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"22","question":"下列何者不在五級專案管理成熟度模式內??","options":[{"letter":"A","text":"各自為政"},{"letter":"B","text":"持續改善"},{"letter":"C","text":"統一流程"},{"letter":"D","text":"風險管理"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 風險管理","answerSource":"原檔解答","note":"D 不正確。請參閱P205 的圖18-1。"},{"id":"IPMA-CH18-023","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"23","question":"下列何者為非?","options":[{"letter":"A","text":"各自為政是指沒有正式的專案管理流程"},{"letter":"B","text":"統一流程是指各部門使用完全不相同的專案管理流程"},{"letter":"C","text":"持續改善是指建立制度化的專案管理流程改善機制"},{"letter":"D","text":"量化衡量是指組織以量化的方式衡量專案管理流程的績效"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 統一流程是指各部門使用完全不相同的專案管理流程","answerSource":"原檔解答","note":"B.不正確。原因是統一流程是指各部門使用完全不相同的專案管理流程請, 參閱P206。"},{"id":"IPMA-CH18-024","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"24","question":"專案手法的主要特徵,以下何者為是??","options":[{"letter":"A","text":"部門主管提供支持"},{"letter":"B","text":"絕不使用專案工具"},{"letter":"C","text":"流程不可在部門內重複使用"},{"letter":"D","text":"專案結果無法預測"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 部門主管提供支持","answerSource":"原檔解答","note":"A. 正確。請參閱P206。 B. 不正確。原因是使用通用的專案工具,請參閱P206。 C. 不正確。原因是流程可以在部門內重複使用,請參閱P206。 D. 不正確。原因是專案結果稍可預測,請參閱P206。"},{"id":"IPMA-CH18-025","category":"IPMA自我評量","source":"Chapter 18 組織專案管理成熟度.pdf","section":"Chapter 18","originalNo":"25","question":"專案管理成熟模式有幾級??","options":[{"letter":"A","text":"8 級"},{"letter":"B","text":"1 xt":"專案發起人"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案經理","answerSource":"原檔解答","note":"專案經理主要責任達成預算、進度及品質目標。"},{"id":"IPMA-CH03-004","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"4","question":"以下何者負責專案執行?","options":[{"letter":"A","text":"專案客戶"},{"letter":"B","text":"專案團隊"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案團隊","answerSource":"原檔解答","note":"執行被指派任務之後彙整資料及呈繳。"},{"id":"IPMA-CH03-005","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"5","question":"以下何者是表達產品及服務需求者?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案客戶"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"以上皆非"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案客戶","answerSource":"原檔解答","note":"客戶對專案真正需求,對經理及團隊說明專案需求。"},{"id":"IPMA-CH03-006","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"6","question":"以下何者不是專案發起人責任?","options":[{"letter":"A","text":"了解客戶需求"},{"letter":"B","text":"提供資源給專案"},{"letter":"C","text":"取得高層對專案支持"},{"letter":"D","text":"落實專案的政策和程序"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 落實專案的政策和程序","answerSource":"原檔解答","note":"由專案經理負責。"},{"id":"IPMA-CH03-007","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"7","question":"以下何者為經理責任?","options":[{"letter":"A","text":"落實專案政策和程序"},{"letter":"B","text":"完成任務所需資源"},{"letter":"C","text":"維持成員專業度"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"另外還包括確保專案工作結果品質、尋求專案管理的輔助工具。"},{"id":"IPMA-CH03-008","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"8","question":"以下何者為團隊責任","options":[{"letter":"A","text":"協助規劃專案"},{"letter":"B","text":"追蹤專案"},{"letter":"C","text":"品保單位提高 發起階段"},{"letter":"B","text":"專案進行中"},{"letter":"C","text":"專案結束階段"},{"letter":"D","text":"以上皆非"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案發起階段","answerSource":"原檔解答","note":"在專案發起前指派,已擬定專案專案實施計畫書。"},{"id":"IPMA-CH03-014","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"14","question":"專案團隊中的執行何者有誤?","options":[{"letter":"A","text":"執行被指派的任務"},{"letter":"B","text":"追蹤專案的進行"},{"letter":"C","text":"產出專案產品或服務"},{"letter":"D","text":"找出風險並制定因應措施"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 找出風險並制定因應措施","answerSource":"原檔解答","note":"專案團隊的專案執行,包括執行被指派任務、產出專案產品或服務、追蹤專 案的進行、提供各自的專案狀態報告、產出型態控制文件。"},{"id":"IPMA-CH03-015","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"15","question":"對於下列專案執行人員何者有錯誤?","options":[{"letter":"A","text":"訓練人員"},{"letter":"B","text":"技術人員"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"活動負責人員"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案經理","answerSource":"原檔解答","note":"專案經理責任在於專案的管理。"},{"id":"IPMA-CH03-016","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"16","question":"專案經理通常都由誰指派?","options":[{"letter":"A","text":"專案推動委員會"},{"letter":"B","text":"部門經理"},{"letter":"C","text":"專案發起人"},{"letter":"D","text":"專案關係人"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案推動委員會","answerSource":"原檔解答","note":"專案經理於專案發起前由專案推動委員會指派。"},{"id":"IPMA-CH03-017","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"17","question":"何者是執行專案的高層管理者?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案關係人"},{"letter":"D","text":"部門經理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案發起人","answerSource":"原檔解答","note":"專案發起人是組織中負責監督及協助某依專案的高階主管,主要角色是策略 性的監控專案,以確保達成組織的專案目標。"},{"id":"IPMA-CH03-018","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"18","question":"專案團隊必須在何時找出所有的專案關係人?","options":[{"letter":"A","text":"專案成立前"},{"letter":"B","text":"專案成立初期"},{"letter":"C","text":"專案成立中期"},{"letter":"D","text":"專案成立後期"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案成立初期","answerSource":"原檔解答","note":"專案關係人的需求和意見是專案的成功關鍵,所以專案團隊必須在專案初期, 找出所有專案關係人。"},{"id":"IPMA-CH03-019","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"19","question":"以下何者負責核准專案?","options":[{"letter":"A","text":"專案推動委員會"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案關係人"},{"letter":"D","text":"專案客戶"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案推動委員會","answerSource":"原檔解答","note":"推動委員會定義、審核並更新組織的專案管理方法和政策。"},{"id":"IPMA-CH03-020","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"20","question":"以下種是專案執行人員?","options":[{"letter":"A","text":"需求發展人員"},{"letter":"B","text":"專案管理人員"},{"letter":"C","text":"專業領域專家"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":""},{"id":"IPMA-CH03-021","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"21","question":"專案經理的一般責任何者有誤?","options":[{"letter":"A","text":"落實專案的政策和程序"},{"letter":"B","text":"取得完成任務所需的資源"},{"letter":"C","text":"指定發起人的聯絡窗口"},{"letter":"D","text":"維持專案成員的專業度"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 指定發起人的聯絡窗口","answerSource":"原檔解答","note":"指定發起人的聯絡窗口,為專案發起人在專案發起時的工作。"},{"id":"IPMA-CH03-022","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"22","question":"下列何者為專案推動委員會的一般責任?","options":[{"letter":"A","text":"定義、審查並更新組織的專案管理方法和政策"},{"letter":"B","text":"了解客戶需求"},{"letter":"C","text":"確保專案滿足客戶需求"},{"letter":"D","text":"落實專案的政策和程序"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 定義、審查並更新組織的專案管理方法和政策","answerSource":"原檔解答","note":"了解客戶需求及確保專案滿足客戶需求,為專案發起人的責任。落實專案的 政策和程序是專案經理的責任。"},{"id":"IPMA-CH03-023","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"23","question":"下列何者是專案客戶的責任?","options":[{"letter":"A","text":"參與需求的審查會議"},{"letter":"B","text":"核准專案的設計"},{"letter":"C","text":"協同解決需求問題"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":""},{"id":"IPMA-CH03-024","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"24","question":"專案團隊在規劃階段須做哪些事?","options":[{"letter":"A","text":"協助專案經理制訂專案計畫書"},{"letter":"B","text":"各自完成自己的工作"},{"letter":"C","text":"接受績效的管理審查"},{"letter":"D","text":"整理文件並提供經驗和教訓"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 協助專案經理制訂專案計畫書","answerSource":"原檔解答","note":"各自完成自己的工作為執行階段 接受績效的管理審查為在控制階段 整理文 件並提供經驗和教訓為結束階段。"},{"id":"IPMA-CH03-025","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"25","question":"專案發起人在專案發起時的責任下列何者為非?","options":[{"letter":"A","text":"提供策略性的觀點引導專案朝向加值方向進行"},{"letter":"B","text":"定義發起人需求"},{"letter":"C","text":"爭取預算給專案"},{"letter":"D","text":"審核大型專案的概念書"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 審核大型專案的概念書","answerSource":"原檔解答","note":"審核大型專案的概念書,此為專案推動委員會的責任。"},{"id":"IPMA-CH03-026","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"26","question":"下列何者為專案客戶在專案結束時的責任?","options":[{"letter":"A","text":"參與經驗教訓的留存"},{"letter":"B","text":"指派人員參與經驗教訓的檢討"},{"letter":"C","text":"專案資料的彙整及呈繳"},{"letter":"D","text":"採購合約的結束"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 指派人員參與經驗教訓的檢討","answerSource":"原檔解答","note":"參與經驗教訓的留存為專案發起人的責任 專案資料的彙整及呈繳為專案團 隊的責任 採購合約的結束為專案經理的責任。"},{"id":"IPMA-CH03-027","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"27","question":"何者是專案成敗的負責人?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案關係人"},{"letter":"D","text":"專案推動委員會"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案經理","answerSource":"原檔解答","note":"專案經理是專案成敗的負責人。"},{"id":"IPMA-CH03-028","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"28","question":"何者是專案推動委員會和發起人共同的職責?","options":[{"letter":"A","text":"審核計劃書"},{"letter":"B","text":"核准專案計畫書"},{"letter":"C","text":"解決任何問題"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":""},{"id":"IPMA-CH03-029","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"29","question":"以下何者要協助專案經理制定計劃書?","options":[{"letter":"A","text":"專案團隊"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案客戶"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案團隊須協助粗略估計專案。"},{"id":"IPMA-CH03-030","category":"IPMA自我評量","source":"Chapter 3 專案管理角色責任.pdf","section":"Chapter 3","originalNo":"30","question":"專案中何者是負責監控活動者?","options":[{"letter":"A","text":"專案推動委員會"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案經理","answerSource":"原檔解答","note":"專案經理日常工作管理並指導成員。"},{"id":"IPMA-CH04-001","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"1","question":"下列哪一個不是用來執行專案的組織型式?","options":[{"letter":"A","text":"功能型專案組織"},{"letter":"B","text":"矩陣型專案組織"},{"letter":"C","text":"設計型專案組織"},{"letter":"D","text":"網路型專案組織"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 設計型專案組織","answerSource":"原檔解答","note":"用來執行專案的組織型式有:功能型專案組織.矩陣型專案組織.純專案型組 織.虛擬專案組織(網路型專案組織)。"},{"id":"IPMA-CH04-002","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"2","question":"矩陣型專案是賦予誰權力?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案團隊 D 專案關係人"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案經理","answerSource":"原檔解答","note":"矩陣行專案是賦予專案經理權力,依據需要向部門經理借調人員,當專案結 束或任務完成後,人員就歸建回到原屬部門。"},{"id":"IPMA-CH04-003","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"3","question":"下列哪一個是專案經理對成員掌控力最弱的組織型態?","options":[{"letter":"A","text":"功能型專案組織"},{"letter":"B","text":"純專案型組織"},{"letter":"C","text":"強矩陣型組織"},{"letter":"D","text":"以上皆非"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 功能型專案組織","answerSource":"原檔解答","note":"功能型專案組織是專案經理對成員掌控力最弱的組織型態。"},{"id":"IPMA-CH04-004","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"4","question":"下列哪一個不屬於在矩陣型組織內?","options":[{"letter":"A","text":"弱矩陣型組織"},{"letter":"B","text":"平衡矩陣型組織"},{"letter":"C","text":"強矩陣型組織"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"矩陣型組織包括:弱矩陣型組織.不平衡矩陣型組織.強矩陣型組織三種。"},{"id":"IPMA-CH04-005","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"5","question":"下列哪一個是希望在部門式的組織下執行專案?","options":[{"letter":"A","text":"功能型專案組織"},{"letter":"B","text":"矩陣型專案組織"},{"letter":"C","text":"純專案型組織"},{"letter":"D","text":"虛擬專案組織"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 矩陣型專案組織","answerSource":"原檔解答","note":"矩陣型組織是希望在部門式的組織下執行專案,而又要增加專案經理對成員 掌控力的一種組織型態。"},{"id":"IPMA-CH04-006","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"6","question":"矩陣型組織是希望在什麼樣的組織下執行專案?","options":[{"letter":"A","text":"協調式"},{"letter":"B","text":"獨立式"},{"letter":"C","text":"部門式"},{"letter":"D","text":"競爭式"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 部門式","answerSource":"原檔解答","note":"矩陣型組織是希望在部門式的組織下執行專案,而又要增加專案經理對成員 掌控力的一種組織型態。"},{"id":"IPMA-CH04-007","category":"IPMA自我評量","source":"Chapter 4 專案管理組織.pdf","section":"Chapter 4","originalNo":"7","question":"『專案成員依照專長分屬在不同的部門,每一個部門有一個部門經理,專案經 理必須透過部門經理,才能將專案的任務下達給專案成員。』下列哪一個符 合以上敘述?","options":[{"letter":"A","text":"功能型專案組織"},{"letter":"B","text":"矩陣型專案 "},{"letter":"C","text":"專案配置。專案人事"},{"letter":"D","text":"專案人事。專案配置"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案成本。專案預算","answerSource":"原檔解答","note":"預估專案成本與準備專案預算"},{"id":"IPMA-CH06-028","category":"IPMA自我評量","source":"Chapter 6 專案管理流程.pdf","section":"Chapter 6","originalNo":"28","question":"專案管理流程是用來風險分析與建立何者之利害關係?","options":[{"letter":"A","text":"攸關團體"},{"letter":"B","text":"主要團體"},{"letter":"C","text":"環保團體"},{"letter":"D","text":"專案內部人員"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 攸關團體","answerSource":"原檔解答","note":"風險分析與建立攸關團體之利害關係"},{"id":"IPMA-CH06-029","category":"IPMA自我評量","source":"Chapter 6 專案管理流程.pdf","section":"Chapter 6","originalNo":"29","question":"何者非專案管理流程必須持續之動作?","options":[{"letter":"A","text":"控制"},{"letter":"B","text":"監督"},{"letter":"C","text":"溝通"},{"letter":"D","text":"執行"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 執行","answerSource":"原檔解答","note":"持續監督、控制與溝通"},{"id":"IPMA-CH06-030","category":"IPMA自我評量","source":"Chapter 6 專案管理流程.pdf","section":"Chapter 6","originalNo":"30","question":"專案管理流程之最後步驟為何?","options":[{"letter":"A","text":"結案控制"},{"letter":"B","text":"結束監督"},{"letter":"C","text":"結案管理"},{"letter":"D","text":"結束執行"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 結案管理","answerSource":"原檔解答","note":"結案管理"},{"id":"IPMA-CH07-001","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"1","question":"下列哪一個英文代號簡稱為工作分解結構?","options":[{"letter":"A","text":"OBS"},{"letter":"B","text":"LSM"},{"letter":"C","text":"WBS"},{"letter":"D","text":"PMO"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. WBS","answerSource":"原檔解答","note":"工作分解結構:WBS, work breakdown structure.。"},{"id":"IPMA-CH07-002","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"2","question":"執行 WBS 活動,可以辨別出什麼樣的風險,下列何者為是?","options":[{"letter":"A","text":"服務"},{"letter":"B","text":"品質"},{"letter":"C","text":"規劃"},{"letter":"D","text":"溝通"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 品質","answerSource":"原檔解答","note":"所有需要執行的WBS活動之後,可以逐一便是造成難度、成本、品質及範 圍問題的所有風險項目。"},{"id":"IPMA-CH07-003","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"3","question":"影響專案的衝擊,要使用何者分析來判斷?","options":[{"letter":"A","text":"定性分析"},{"letter":"B","text":"定份分析"},{"letter":"C","text":"定時分析"},{"letter":"D","text":"定量分析"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 定量分析","answerSource":"原檔解答","note":"承2,所有項目接著已定性分析決定他們的重要排序,已定量分析隊專案的 衝擊大小。"},{"id":"IPMA-CH07-004","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"4","question":"專案所牽連的層面很廣,下面何者可以用來確認訓練項目是否達成成效?","options":[{"letter":"A","text":"RAM"},{"letter":"B","text":"WBS"},{"letter":"C","text":"DDM"},{"letter":"D","text":"DBS"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. WBS","answerSource":"原檔解答","note":"如果專案牽涉到產品製造的問題,也要事先規劃好和產品製造有關的所有事 項。另外審視WBS的活動也可以確任出來必要的訓練項目。"},{"id":"IPMA-CH07-005","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"5","question":"下列何者行成是由專案範圍下拆解成WBS 所進行的工作指派?","options":[{"letter":"A","text":"OBS"},{"letter":"B","text":"PDM"},{"letter":"C","text":"RAM"},{"letter":"D","text":"LSM"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. OBS","answerSource":"原檔解答","note":"專案發起後進入執行,首先把專案目標具體成為專案範圍,然後再將專案範 圍往下拆解成工作分解結構(work breakdown structure),由工作分解結構進 行工作的指派,行程組織分解結構OBS(organization breakdown structure)。"},{"id":"IPMA-CH07-006","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"6","question":"專案管理步驟中,專案進度是由四個要素合成,下列何者為否?","options":[{"letter":"A","text":"預算規劃"},{"letter":"B","text":"工作估計"},{"letter":"C","text":"風險因應"},{"letter":"D","text":"訓練規劃"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 工作估計","answerSource":"原檔解答","note":"參考課本P.34專案管理步驟圖,可以得知專案進度是由預算規劃,風險因 應,溝通規劃和訓練規劃來組成。"},{"id":"IPMA-CH07-007","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"7","question":"專案發起後進入執行,首先把『專案目標』具體化成『專案範圍』,然後專案 範圍可往下拆成什麼?來進行工作的指派。","options":[{"letter":"A","text":"組織分解結構"},{"letter":"B","text":"工作分解結構"},{"letter":"C","text":"專案分解結構"},{"letter":"D","text":"規劃分解結構"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 工作分解結構","answerSource":"原檔解答","note":"A. 錯誤,工作指派完成後即行成組織分解結構。 B. 正確,由工作分解結構可以進行工作的指派。 C. 錯誤,沒有此分解結構。 D. 錯誤,沒有此分解結構。"},{"id":"IPMA-CH07-008","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"8","question":"經由工作分解結構(WBS)可以了解到的資訊有?","options":[{"letter":"A","text":"完成活動必須達到的品質標準"},{"letter":"B","text":"歸納出需要採購以及招標的物品和服務"},{"letter":"C","text":"確認必要的訓練項目"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"經由工作分解結構(WBS)可以知道完成活動必須達到的品質標準,也可以歸 納出需要採購以及需要招標的物品與服務,然後對外進行招標作業,選出最 好的一個或幾個供應商,更可以確認出來必要的項目,以及規劃避免成員安 全受到威脅,和降低產品影響使用者安全的預防措施。"},{"id":"IPMA-CH07-009","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"9","question":"知道所有需要執行的工作分解結構(WBS)活動後,可以逐一辨識造成進度、 成本、品質及範圍問題的所有風險項目,然後以何種分析決定他們的重要排 序?","options":[{"letter":"A","text":"定量分析"},{"letter":"B","text":"風險分析"},{"letter":"C","text":"定性分析"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 定性分析","answerSource":"原檔解答","note":"A. 錯誤,定量分析是決定風險項目對專案的衝擊大小。 B. 錯誤,無此分析。 C. 正確,重要性排序是由定性分析排序的。 D. 錯誤,上述選項有正確的。"},{"id":"IPMA-CH07-010","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"10","question":"有了工作分解結構,接著即是什麼活動?即拆解工作包成活動清單。","options":[{"letter":"A","text":"定義活動"},{"letter":"B","text":"拆解活動"},{"letter":"C","text":"分配活動"},{"letter":"D","text":"以上皆非"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 定義活動","answerSource":"原檔解答","note":"A. 正確,定義活動即是拆解工作包成活動清單 B. 錯誤,無此活動。 C. 錯誤,無此活動。 D. 錯誤,上述選項有正確。"},{"id":"IPMA-CH07-011","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"11","question":"拆解工作包成活動清單發生在專案管理五大程序的哪個程序?","options":[{"letter":"A","text":"發起"},{"letter":"B","text":"規劃"},{"letter":"C","text":"控制"},{"letter":"D","text":"執行"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 控制","answerSource":"原檔解答","note":"A. 錯誤,不是在此程序發生。 B. 錯誤,不是在此程序發生。 C. 正確,工作包拆解即是在此程序發生。 D. 錯誤,不是在此程序發生。"},{"id":"IPMA-CH07-012","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"12","question":"由審視工作分解結構(WBS)的活動可以確認出?","options":[{"letter":"A","text":"規劃避免成員安全受到威脅"},{"letter":"B","text":"降低產品影響使用者安全的預防措施"},{"letter":"C","text":"必要的訓練項目"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"由審視工作分解結構(WBS)可以確認出來必要的項目,以及規劃避免成員安 全受到威脅,和降低產品影響使用者安全的預防措施。"},{"id":"IPMA-CH07-013","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"13","question":"由工作分解結構可以進行工作的指派,行成什麼?","options":[{"letter":"A","text":"OBS"},{"letter":"B","text":"WBS"},{"letter":"C","text":"OFF"},{"letter":"D","text":"PMO"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. OBS","answerSource":"原檔解答","note":"組織分解結構:organization breakdown structure。"},{"id":"IPMA-CH07-014","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"14","question":"執行WBS 活動之後,需要辨識什麼?下列何者為非。","options":[{"letter":"A","text":"品質"},{"letter":"B","text":"規劃"},{"letter":"C","text":"成本"},{"letter":"D","text":"時間"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 時間","answerSource":"原檔解答","note":"需辨別品質、規劃、成本和範圍。"},{"id":"IPMA-CH07-015","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"15","question":"專案發起到執行中間,有(1)專案範圍(2)組織分析結構(3)專案目 標(4)工作分解結構,四個控制步驟。請依序排列。","options":[{"letter":"A","text":"1234"},{"letter":"B","text":"1423"},{"letter":"C","text":"4321"},{"letter":"D","text":"3142"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 3142","answerSource":"原檔解答","note":"專案目標,專案範圍,工作結構分析,組織分析結構。"},{"id":"IPMA-CH07-016","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"16","question":"WBS 可以進行一般資源和人力資源的規劃,包括所需要的資源種類及數量, 然後得到下列何者?","options":[{"letter":"A","text":"成本"},{"letter":"B","text":"資源"},{"letter":"C","text":"花費"},{"letter":"D","text":"時間"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 成本","answerSource":"原檔解答","note":"一般資源規劃和人力資源規劃後得到成本估計,接著在得到預算規劃。"},{"id":"IPMA-CH07-017","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"17","question":"下列何者可以知道完成活動必須達到的品質標準?","options":[{"letter":"A","text":"WBS"},{"letter":"B","text":"PMO"},{"letter":"C","text":"OBS"},{"letter":"D","text":"DDR"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. WBS","answerSource":"原檔解答","note":"組織分析結構(WBS)可以檢視活動完成必須達到的品質標準外,還可以 在執行過程中,需要哪些專案關係人進行必要的會議及書面溝通。"},{"id":"IPMA-CH07-018","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"18","question":"下列何者不屬於工作結構分析(WBS)步驟?","options":[{"letter":"A","text":"安全規劃"},{"letter":"B","text":"溝通規劃"},{"letter":"C","text":"系統規劃"},{"letter":"D","text":"人事規劃"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 人事規劃","answerSource":"原檔解答","note":"請參閱課本P.34圖7─1專案管理步驟。"},{"id":"IPMA-CH07-019","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"19","question":"『專案規劃』的步驟。首先把『專案目標』具體化成『專案範圍』,然後往下 拆解成『工作分解結構』的英文簡稱是?","options":[{"letter":"A","text":"WBS(work breakdown structure)"},{"letter":"B","text":"WWF(World Wrestling Federation)"},{"letter":"C","text":"WWE(World Wrestling Entertainmen )"},{"letter":"D","text":"ECW(Extreme Champion Wrestling)"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. WBS(work breakdown structure)","answerSource":"原檔解答","note":"A. 正確,工作分解結構的正確名稱試WBS。 B. 錯誤,WWF(World Wrestling Federation )世界摔角娛樂。 C. 錯誤,WWE(World Wrestling Entertainment )世界冠軍摔角。 D. 錯誤,ECW(Extreme Champion Wrestling)極限冠軍摔角。"},{"id":"IPMA-CH07-020","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"20","question":"『專案規劃』的步驟。首先把『專案目標』具體化成『專案範圍』,然後往下 拆解成『工作分解結構』(WBS)由工作分解結構可以進行工作的指派,形成 組織結構,請問組織結構的簡稱?","options":[{"letter":"A","text":"OTD"},{"letter":"B","text":"OTB"},{"letter":"C","text":"OBS"},{"letter":"D","text":"WBS"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. OBS","answerSource":"原檔解答","note":"A. 錯誤,LSM 是線性流程模式。 B. 錯誤,RADM 是快速發展流程模式。 C. 正確,由工作分解結構(WBS)可以進行工作的指派,形成組織分解結構 (OBS) 。 D. 錯誤,WBS(work breakdown structure)工作分解結構。"},{"id":"IPMA-CH07-021","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"21","question":"WBS 可以進行『一般資源』和『人力資源』的規劃。OBS 可以進行工作的指 派,活動的定義、活動排序、工時估計,但在規劃、估計的過程中有互相影 響到的是什麼估計?","options":[{"letter":"A","text":"成本估計"},{"letter":"B","text":"產品設計"},{"letter":"C","text":"製程設計"},{"letter":"D","text":"產品與製程驗證"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 成本估計","answerSource":"原檔解答","note":"A. 正確,因為WBS 在『一般資源』和『人力資源』的規劃。常互相牽涉到 成本。 B、C、D. 錯誤,在過程中互相有影響到的是成本估計 因為一般資源規劃、 人力資源規劃所需的成本與工時估計成正比。"},{"id":"IPMA-CH07-022","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"22","question":"執行WBS 活動之後,可以逐一辨識成進度、成本、品質及範圍問題的所有風 險項目,請問要用什麼分析來決定對專案的衝擊大小,來擬定因應風險的措 施?","options":[{"letter":"A","text":"定量分析"},{"letter":"B","text":"定性分析"},{"letter":"C","text":"訓練規劃"},{"letter":"D","text":"安全規劃"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 定量分析","answerSource":"原檔解答","note":"A. 正確,因為必須以定量分析來節定他們的重要程序。 B. 錯誤,定性分析是為了分析決定它們的重要排序。 C、D. 錯誤,此兩規劃並不用分析對專案的衝擊大小。"},{"id":"IPMA-CH07-023","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"23","question":"如果專案牽涉到產品製造的問題,比須事先規劃好和產品製造有關所的有事 項,請問下列哪個不是有關事先規劃好和產品製造有關所有事項?","options":[{"letter":"A","text":"風險規劃"},{"letter":"B","text":"訓練規劃"},{"letter":"C","text":"系統規劃"},{"letter":"D","text":"型態管理規劃"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 風險規劃","answerSource":"原檔解答","note":"B、C、D. 以上皆是 在規劃和產品製造個過程中 必須先有良好的訓練規劃、 系統規劃、型態管理規劃、品質規劃...等。"},{"id":"IPMA-CH07-024","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"24","question":"WBS 的項目可以歸納出需要採購以及需要招標的物品和服務,然後對外進行 什麼作業?","options":[{"letter":"A","text":"招標作業"},{"letter":"B","text":"流標作業"},{"letter":"C","text":"綁標作業"},{"letter":"D","text":"採購作業"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 招標作業","answerSource":"原檔解答","note":"A. 正確,需有招標作業才能估計成本 購買材料。 B、C、D. 錯誤,因為如果沒有招標作業如何使專案繼續進行呢。"},{"id":"IPMA-CH07-025","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"25","question":"從專案的發起規劃,執行到結束各有不同的什麼步驟?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"專案規劃"},{"letter":"C","text":"專案目標"},{"letter":"D","text":"專案範圍"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案管理","answerSource":"原檔解答","note":"從專案的發起、規劃、執行到結束,各有其不同的專案管理步驟。"},{"id":"IPMA-CH07-026","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"26","question":"專案規劃的步驟,從專案發起後進入執行的首要步驟為何?","options":[{"letter":"A","text":"專案目標具體化成專案範圍"},{"letter":"B","text":"專案範圍往下拆解成工作分解結構"},{"letter":"C","text":"由工作分解結構可以進行工作的指派"},{"letter":"D","text":"形成組織分解結構"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案目標具體化成專案範圍","answerSource":"原檔解答","note":"專案發起後進入執行,首先把專案目標具體化成專案範圍,然後再將專案範 圍往下拆解成工作分解結構,由工作分解結構可以進行工作的指派,形成組 織分解結構。"},{"id":"IPMA-CH07-027","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"27","question":"同上題,首要步驟後,次要步驟為何?","options":[{"letter":"A","text":"專案目標具體化成專案範圍"},{"letter":"B","text":"專案範圍往下拆解成工作分解結構"},{"letter":"C","text":"由工作分解結構可以進行工作的指派"},{"letter":"D","text":"形成組織分解結構"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案範圍往下拆解成工作分解結構","answerSource":"原檔解答","note":"專案發起後進入執行,首先把專案目標具體化成專案範圍,然後再將專案範 圍往下拆解成工作分解結構,由工作分解結構可以進行工作的指派,形成組 織分解結構。"},{"id":"IPMA-CH07-028","category":"IPMA自我評量","source":"Chapter 7 專案管理步驟.pdf","section":"Chapter 7","originalNo":"28","question":"承(2)、(3)題,後  約束及假設狀況 限制及假設 專案活動 執行活動所需 要之相關資料 及文件 輸 入 產 出 執行活動後的產 出,如文件、產出 執行活動後的 方法及工具 方法"},{"id":"IPMA-CH08-023","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"23","question":"何者選項是專案「組織分解結構」的方法?","options":[{"letter":"A","text":"OBS"},{"letter":"B","text":"WBS 正確"},{"letter":"C","text":"WBS"},{"letter":"D","text":"人員指派"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 人員指派","answerSource":"原檔解答","note":"原因如下圖。請參閱課本P.69 1.WBS 正確 限制及假設 組織分解結構 1.WBS 輸 入 產 出 1.OBS 1.人員指派 方法"},{"id":"IPMA-CH08-024","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"24","question":"何者選項是專案「活動定義」的方法?","options":[{"letter":"A","text":"WBS"},{"letter":"B","text":"WBS 正確"},{"letter":"C","text":"分解WBS"},{"letter":"D","text":"活動清單"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. WBS 正確","answerSource":"原檔解答","note":"原因如下圖。請參閱課本P.71 1.WBS 正確 限制及假設 活動定義 1. WBS 2. 範圍說明 3. 歷史資料 輸 入 產 出 1. 活動清單 2. 里程碑清單 3. 變更要求 1.活動模板 2.分解WBS 方法"},{"id":"IPMA-CH08-025","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"25","question":"「限制及假設」為專案活動中執行該活動所受到的限制,下列哪一項為所受 到的限制?","options":[{"letter":"A","text":"組織的政策,或是活動的假設"},{"letter":"B","text":"不一定是真的事情認為是真,或是不一定假的事情認為是假"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 以上皆是","answerSource":"原檔解答","note":"原因是執行該活動所受到的限制,組織的政策,或是活動的假設,例如不一 定是真的事情認為是真,或是不一定假的事情認為是假,限制及假設往往是 專案風險的所在。請參閱課本P.35"},{"id":"IPMA-CH08-026","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"26","question":"假設你和另一半決定步入紅毯,想準備一場精緻、完美的婚禮,對於人生中 的大事,你知道那是需要許多謹慎的計畫和工作,既然如此你會如何規劃你 的婚禮呢?","options":[{"letter":"A","text":"決定邀請之親友名單、選擇喜餅,估算所需份數、預計宴客桌數並訂場地 (假設及限制)"},{"letter":"B","text":"選擇訂婚日期、決定結婚的形式,預訂舉行儀式場所 (輸入)"},{"letter":"C","text":"寄出喜帖、確認各項應備辦事物已完備、宴客 (產出、方法)"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"原因是一個專案活動的產生,一開始必須列出你的假設及限制條件(例如要邀 請多少賓客、預算大概多少)之後擬出整個專案時間表,寫下工作分解結構、 製作責任矩陣,列出需要完成婚禮的各項作業。請參閱課本P.35"},{"id":"IPMA-CH08-027","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"27","question":"一個專案活動失敗的主因?","options":[{"letter":"A","text":"團隊默契未建立、溝通不良"},{"letter":"B","text":"專案規模小或時間過短"},{"letter":"C","text":"經驗不足"},{"letter":"D","text":"目標明確"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 團隊默契未建立、溝通不良","answerSource":"原檔解答","note":"原因是專案成員雖然相識已久,但是因為來自不同工作領域,必定存在某種 認知差異,有待融合;只要專案負責人將每一次的專案進度審查會議,定位 在成果發表會,而不是鬥爭大會,就能建立一個情感和諧的榮譽團隊。"},{"id":"IPMA-CH08-028","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"28","question":"專案管理層級模式包含了哪種?","options":[{"letter":"A","text":"發起"},{"letter":"B","text":"控制"},{"letter":"C","text":"規劃"},{"letter":"D","text":"專案管理方法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 專案管理方法","answerSource":"原檔解答","note":"原因是專案管理方法屬於最底層,用來說明執行每個步驟需要用到的技術和 工具,以及會受到限制和可能出錯的假設。專案管理方法的主要功能是提供 專案人員一個清晰的邏輯思考方式,因為他不但清楚的說明美一個活動應該 怎麼做,最重要的是提醒成員在做的時候,需要考慮哪些事項,以避免規劃 執行時的思慮不周。請參閱課本P.36"},{"id":"IPMA-CH08-029","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"29","question":"下列何者不可視為專案活動?","options":[{"letter":"A","text":"交通工程"},{"letter":"B","text":"產品創新研發"},{"letter":"C","text":"公家單位的行政工作"},{"letter":"D","text":"公司公益活動"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 公家單位的行政工作","answerSource":"原檔解答","note":"原因是專案是組織在一定的時間內,為了達成特定目標的臨時性投入和努 力。具有以下特點;執行期間受到限制,也有是有開始和結束日期。有預先 定好的專案目標。投入資源數量受到限制。完成後要產出期望請參閱課本P.3"},{"id":"IPMA-CH08-030","category":"IPMA自我評量","source":"Chapter 8 專案管理方法.pdf","section":"Chapter 8","originalNo":"30","question":"下列何種狀況可視為專案成功?","options":[{"letter":"A","text":"提供合約所要之需求"},{"letter":"B","text":"專案產品完成時"},{"letter":"C","text":"專案經理宣佈專案完成"},{"letter":"D","text":"符合或超出專案關係人的需求"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 符合或超出專案關係人的需求","answerSource":"原檔解答","note":"原因是專案關鍵成功因素是指影響專案進行順暢的所有因素,專案關鍵成功 因素如下:1.高階主管支持專案 2.專案目標明確 3.專案計畫清楚可行 4.專案 關係人管理妥當 5.專案成員的專長分佈平均 6.有效管理專案的溝通 7.專案 經理管理能力。請參閱課本P.10"},{"id":"IPMA-CH09-001","category":"IPMA自我評量","source":"Chapter 9 專案管理層級模式.pdf","section":"Chapter 9","originalNo":"1","question":"以下何者不是管理好專案所必須具備的基礎架構(infrastructure)?","options":[{"letter":"A","text":"訓練合格的專案人員"},{"letter":"B","text":"多讀有關專案管理的書籍"},{"letter":"C","text":"適當設計的管理制度"},{"letter":"D","text":"輔助管理的資訊工具"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 多讀有關專案管理的書籍","answerSource":"原檔解答","note":"專案管理人員不但可以對專案管理的知識體系有更深刻的了解,而且在專案 執行實務上,可以有共同的溝通語言,對專案管理知識和實務的結合有很大 的幫助"},{"id":"IPMA-CH09-002","category":"IPMA自我評量","source":"Chapter 9 專案管理層級模式.pdf","section":"Chapter 9","originalNo":"2","question":"以下何者不是建構出一個四階的專案管理層級模式?","options":[{"letter":"A","text":"專案管理控制"},{"letter":"B","text":"專案管理架構"},{"letter":"C","text":"專案管理流程"},{"letter":"D","text":"專案管理方法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案管理控制","answerSource":"原檔解答","note":"專案管理控制不是專案管理層級模式的其中一項"},{"id":"IPMA-CH09-003","category":"IPMA自我評量","source":"Chapter 9 專案管理層級模式.pdf","section":"Chapter 9","originalNo":"3","question":"以下何者不是在專案執行的實務上有很大的幫助的結果?","options":[{"letter":"A","text":"有共同的溝通語言"},{"letter":"B","text":"對專案管理的知識體系有更深刻的了解"},{"letter":"C","text":"可以為專案有關的工作謀取更多資金"},{"letter":"D","text":"對專案管理知識和實務的結合有很大的幫助"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 可以為專案有關的工作謀取更多資金","answerSource":"原檔解答","note":"做專案有關的工作謀取更多資金在專案執行的實務上沒有太大的幫助"},{"id":"IPMA-CH09-004","category":"IPMA自我評量","source":"Chapter 9 專案管理層級模式.pdf","section":"Chapter 9","originalNo":"4","question":"以下何者不是串聯專案管理的整個過程?","options":[{"letter":"A","text":"規劃"},{"letter":"B","text":"發起"},{"letter":"C","text":"檢討"},{"letter":"D","text":"控制"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 檢討","answerSource":"原檔解答","note":"檢討不是串聯整個專案管理的過程"},{"id":"IPMA-CH09-005","category":"IPMA自我評量","source":"Chapter 9 專案管理層級模式.pdf","section":"Chapter 9","originalNo":"5","question":"哪一層是         if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.selectedKeys)) return defaultState();
        parsed.selectedKeys = parsed.selectedKeys.filter(k => ALL_KEYS.includes(k));
        if (!parsed.selectedKeys.length) parsed.selectedKeys = [...ALL_KEYS];
        parsed.queue = Array.isArray(parsed.queue) ? parsed.queue.filter(i => Number.isInteger(i) && QUESTIONS[i]) : [];
        parsed.wrongLog = Array.isArray(parsed.wrongLog) ? parsed.wrongLog.filter(w => Number.isInteger(w.qIndex) && QUESTIONS[w.qIndex]) : [];
        return { ...defaultState(), ...parsed };
      } catch (e) { return defaultState(); }
    }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function setVisible(id, show) { el(id).classList.toggle('hidden', !show); }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function selectedPool() {
      const keys = new Set(state.selectedKeys);
      return QUESTIONS.map((q, i) => ({q, i})).filter(x => keys.has(sourceKey(x.q))).map(x => x.i);
    }
    function requestedCount(poolLen) {
      if (state.customAmount && Number(state.customAmount) > 0) return Math.min(poolLen, Math.max(1, Number(state.customAmount)));
      if (state.amountMode === 'all') return poolLen;
      return Math.min(poolLen, Number(state.amountMode || 10));
    }
    function startQuiz() {
      const pool = selectedPool();
      if (!pool.length) { alert('請至少選擇一個題目來源。'); return; }
      const count = requestedCount(pool.length);
      const ordered = state.orderMode === 'random' ? shuffle(pool) : [...pool];
      state = { ...state, phase: 'quiz', queue: ordered.slice(0, count), pos: 0, correct: 0, wrong: 0, wrongLog: [], currentAnswer: null, selectedLetter: null, startedAt: new Date().toISOString() };
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function startWrongPractice() {
      if (!state.wrongLog.length) { alert('目前沒有錯題可以重練。'); return; }
      const unique = [];
      const seen = new Set();
      state.wrongLog.forEach(w => { if (!seen.has(w.qIndex)) { seen.add(w.qIndex); unique.push(w.qIndex); } });
      state.phase = 'quiz';
      state.queue = state.orderMode === 'random' ? shuffle(unique) : unique;
      state.pos = 0;
      state.correct = 0;
      state.wrong = 0;
      state.wrongLog = [];
      state.currentAnswer = null;
      state.selectedLetter = null;
      state.startedAt = new Date().toISOString();
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function resetToSetup(confirmFirst = true) {
      if (confirmFirst && !confirm('確定要回到設定並清除目前進度嗎？')) return;
      const keepKeys = state.selectedKeys && state.selectedKeys.length ? state.selectedKeys : [...ALL_KEYS];
      const orderMode = state.orderMode || 'random';
      const amountMode = state.amountMode || '10';
      const customAmount = state.customAmount || '';
      state = defaultState();
      state.selectedKeys = keepKeys;
      state.orderMode = orderMode;
      state.amountMode = amountMode;
      state.customAmount = customAmount;
      saveState();
      render();
    }
    function clearWrongBook() {
      if (!state.wrongLog.length) return;
      if (!confirm('確定清空錯題本嗎？')) return;
      state.wrongLog = [];
      saveState();
      renderWrongBook();
      updateStats();
    }
    function currentQuestionIndex() { return state.queue[state.pos]; }
    function currentQuestion() { return QUESTIONS[currentQuestionIndex()]; }
    function answeredCount() { return state.correct + state.wrong; }
    function accuracy() { const a = answeredCount(); return a ? Math.round(state.correct / a * 100) : 0; }

    function renderSetupControls() {
      const quickWrap = el('quickCategoryBtns');
      quickWrap.innerHTML = CAT_ORDER.map(cat => {
        const cnt = QUESTIONS.filter(q => q.category === cat).length;
        return `<button class="secondary quick-btn" type="button" data-cat="${escapeHtml(cat)}">${escapeHtml(CAT_LABEL[cat] || cat)} <span class="count">${cnt}</span></button>`;
      }).join('');
      quickWrap.querySelectorAll('[data-cat]').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.cat;
          state.selectedKeys = SOURCE_GROUPS.filter(g => g.category === cat).map(g => g.key);
          saveState();
          renderSourceChips();
          updateSetupCount();
        });
      });
      renderSourceChips();
      renderModeControls();
    }
    function renderSourceChips() {
      const wrap = el('sourceGroups');
      const byCat = new Map();
      SOURCE_GROUPS.forEach(g => {
        if (!byCat.has(g.category)) byCat.set(g.category, []);
        byCat.get(g.category).push(g);
      });
      wrap.innerHTML = CAT_ORDER.filter(cat => byCat.has(cat)).map(cat => {
        const chips = byCat.get(cat).map(g => {
          const active = state.selectedKeys.includes(g.key);
          return `<label class="chip ${active ? 'active' : ''}" data-key="${escapeHtml(g.key)}"><input type="checkbox" ${active ? 'checked' : ''}>${escapeHtml(g.label)} <span class="count">${g.count}</span></label>`;
        }).join('');
        return `<div class="section-title">${escapeHtml(CAT_LABEL[cat] || cat)}</div><div class="source-grid">${chips}</div>`;
      }).join('');
      wrap.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
          e.preventDefault();
          const key = chip.dataset.key;
          const set = new Set(state.selectedKeys);
          if (set.has(key)) set.delete(key); else set.add(key);
          state.selectedKeys = [...set];
          saveState();
          renderSourceChips();
          updateSetupCount();
        });
      });
    }
    function renderModeControls() {
      el('orderGroup').querySelectorAll('[data-order]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.order === state.orderMode);
        btn.onclick = () => { state.orderMode = btn.dataset.order; saveState(); renderModeControls(); updateSetupCount(); };
      });
      el('amountGroup').querySelectorAll('[data-amount]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.amount === state.amountMode && !state.customAmount);
        btn.onclick = () => { state.amountMode = btn.dataset.amount; state.customAmount = ''; el('customAmount').value = ''; saveState(); renderModeControls(); updateSetupCount(); };
      });
      el('customAmount').value = state.customAmount || '';
      el('customAmount').oninput = (e) => {
        state.customAmount = e.target.value;
        if (state.customAmount) state.amountMode = 'custom';
        saveState();
        renderModeControls();
        updateSetupCount();
      };
    }
    function updateSetupCount() {
      const poolLen = selectedPool().length;
      const count = requestedCount(poolLen);
      el('setupSummary').textContent = `已選 ${poolLen} 題，可出 ${count} 題`;
      el('startBtn').disabled = poolLen === 0;
      updateTopProgress(0, count || 0);
    }

    function updateStats() {
      const total = state.queue.length || 0;
      const posDisplay = total ? Math.min(state.pos + 1, total) : 0;
      el('currentStat').textContent = `${posDisplay} / ${total}`;
      el('answeredStat').textContent = answeredCount();
      el('correctStat').textContent = state.correct;
      el('wrongStat').textContent = state.wrong;
      el('accuracyStat').textContent = `${accuracy()}%`;
      const pct = total ? Math.min(100, Math.round(answeredCount() / total * 100)) : 0;
      el('progressBar').style.width = pct + '%';
      updateTopProgress(answeredCount(), total);
    }
    function updateTopProgress(done, total) {
      el('topProgressText').textContent = `${done} / ${total}`;
      el('topProgressBar').style.width = total ? `${Math.min(100, done / total * 100)}%` : '0%';
    }
    function renderQuiz() {
      if (!state.queue.length || state.pos >= state.queue.length) { state.phase = 'finish'; saveState(); render(); return; }
      const q = currentQuestion();
      const qIndex = currentQuestionIndex();
      const submitted = !!state.currentAnswer;
      el('metaRow').innerHTML = [
        `<span class="pill">${escapeHtml(q.category)}</span>`,
        `<span class="pill gray">來源：${escapeHtml(q.source)}</span>`,
        `<span class="pill gray">範圍：${escapeHtml(q.section || '-')}</span>`,
        `<span class="pill gray">原題號：${escapeHtml(q.originalNo || q.id)}</span>`
      ].join('');
      el('questionText').textContent = `${state.pos + 1}. ${q.question}`;
      el('optionsForm').innerHTML = q.options.map(opt => {
        let cls = '';
        if (!submitted && state.selectedLetter === opt.letter) cls = 'selected';
        if (submitted && q.answerLetters.includes(opt.letter)) cls = 'correct';
        if (submitted && state.currentAnswer.letter === opt.letter && !state.currentAnswer.isCorrect) cls = 'wrong';
        return `<label class="option ${cls}"><input type="radio" name="answer" value="${escapeHtml(opt.letter)}" ${state.selectedLetter === opt.letter ? 'checked' : ''} ${submitted ? 'disabled' : ''}><span class="letter">${escapeHtml(opt.letter)}</span><span class="opt-text">${escapeHtml(opt.text)}</span></label>`;
      }).join('');
      el('optionsForm').querySelectorAll('.option').forEach(label => {
        label.addEventListener('click', () => {
          if (state.currentAnswer) return;
          const input = label.querySelector('input');
          state.selectedLetter = input.value;
          saveState();
          el('optionsForm').querySelectorAll('.option').forEach(x => x.classList.remove('selected'));
          label.classList.add('selected');
          el('submitBtn').disabled = false;
        });
      });
      el('submitBtn').disabled = !state.selectedLetter || submitted;
      el('submitBtn').classList.toggle('hidden', submitted);
      el('nextBtn').classList.toggle('hidden', !submitted);
      renderFeedback(q, submitted);
      el('sourceBox').innerHTML = `資料來源：${escapeHtml(q.source)}｜章節/範圍：${escapeHtml(q.section || '-')}｜答案來源：${escapeHtml(q.answerSource || '-')}｜題目ID：${escapeHtml(q.id)}${(!submitted && q.note) ? '<br><span class="small">備註/詳解會在送出答案後顯示。</span>' : ''}`;
      updateStats();
    }
    function renderFeedback(q, submitted) {
      const box = el('feedbackBox');
      if (!submitted) { box.className = 'feedback'; box.innerHTML = ''; return; }
      const ok = state.currentAnswer.isCorrect;
      const selectedOpt = q.options.find(o => o.letter === state.currentAnswer.letter);
      box.className = `feedback show ${ok ? 'good' : 'bad'}`;
      const noteHtml = q.note ? `<div class="explain-box"><div class="explain-title">備註 / 詳解</div><div>${escapeHtml(q.note)}</div></div>` : '';
      box.innerHTML = `<div class="title">${ok ? '答對了' : '答錯了'}</div>
        <div>你的答案：${escapeHtml(state.currentAnswer.letter)}. ${escapeHtml(selectedOpt ? selectedOpt.text : '')}</div>
        <div>正確答案：${escapeHtml(q.answerText || q.answerLetters.join('/'))}</div>${noteHtml}`;
    }
    function submitAnswer() {
      const q = currentQuestion();
      if (!state.selectedLetter || state.currentAnswer) return;
      const isCorrect = q.answerLetters.includes(state.selectedLetter);
      state.currentAnswer = { letter: state.selectedLetter, isCorrect };
      if (isCorrect) state.correct += 1;
      else {
        state.wrong += 1;
        const selectedOpt = q.options.find(o => o.letter === state.selectedLetter);
        state.wrongLog.push({
          qIndex: currentQuestionIndex(),
          selectedLetter: state.selectedLetter,
          selectedText: selectedOpt ? selectedOpt.text : '',
          correctAnswer: q.answerText || q.answerLetters.join('/'),
          at: new Date().toISOString()
        });
      }
      saveState();
      renderQuiz();
      renderWrongBook();
    }
    function nextQuestion() {
      if (!state.currentAnswer) return;
      state.pos += 1;
      state.currentAnswer = null;
      state.selectedLetter = null;
      if (state.pos >= state.queue.length) state.phase = 'finish';
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function renderFinish() {
      const total = state.queue.length;
      el('finishSummary').innerHTML = `本輪共 ${total} 題，答對 <b>${state.correct}</b> 題，答錯 <b>${state.wrong}</b> 題，正確率 <b>${accuracy()}%</b>。`;
      el('practiceWrongBtn').disabled = !state.wrongLog.length;
      updateStats();
      renderWrongBook(true);
    }
    function renderWrongBook(forceShow = false) {
      const card = el('wrongCard');
      if (forceShow && state.wrongLog.length) card.classList.remove('hidden');
      el('wrongSummary').textContent = state.wrongLog.length ? `目前錯題 ${state.wrongLog.length} 題。` : '目前沒有錯題。';
      el('practiceWrongBtn2').disabled = !state.wrongLog.length;
      el('exportWrongBtn3').disabled = !state.wrongLog.length;
      el('clearWrongBtn').disabled = !state.wrongLog.length;
      el('wrongList').innerHTML = state.wrongLog.map((w, idx) => {
        const q = QUESTIONS[w.qIndex];
        return `<div class="wrong-item">
          <div class="wrong-title">${idx + 1}. ${escapeHtml(q.question)}</div>
          <div>你的答案：${escapeHtml(w.selectedLetter)}. ${escapeHtml(w.selectedText)}</div>
          <div>正確答案：${escapeHtml(w.correctAnswer)}</div>
          ${q.note ? `<div class="explain-box"><div class="explain-title">備註 / 詳解</div><div>${escapeHtml(q.note)}</div></div>` : ''}
          <div class="wrong-meta">${escapeHtml(q.category)}｜${escapeHtml(q.source)}｜範圍：${escapeHtml(q.section || '-')}｜原題號：${escapeHtml(q.originalNo || q.id)}</div>
        </div>`;
      }).join('');
    }
    function exportWrongExcel() {
      const rows = state.wrongLog || [];
      const headers = ['序號','題目ID','類別','來源檔案','章節/範圍','原題號','題目','選項A','選項B','選項C','選項D','選項E','你的答案','你的答案文字','正確答案','備註/詳解','答題時間'];
      const tableRows = rows.map((w, idx) => {
        const q = QUESTIONS[w.qIndex];
        const optMap = {};
        q.options.forEach(o => optMap[o.letter] = o.text);
        const data = [idx + 1, q.id, q.category, q.source, q.section || '', q.originalNo || '', q.question, optMap.A || '', optMap.B || '', optMap.C || '', optMap.D || '', optMap.E || '', w.selectedLetter, w.selectedText || '', w.correctAnswer || '', q.note || '', w.at || ''];
        return '<tr>' + data.map(x => `<td>${escapeHtml(x)}</td>`).join('') + '</tr>';
      }).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>table{border-collapse:collapse;font-family:'Microsoft JhengHei',Arial,sans-serif;font-size:12px;}td,th{border:1px solid #999;padding:6px;vertical-align:top;mso-number-format:'\\@';}th{background:#e8eefc;font-weight:bold;}</style></head><body><table><thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${tableRows}</tbody></table></body></html>`;
      const blob = new Blob(['\ufeff', html], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,19).replace(/[T:]/g, '-');
      a.href = URL.createObjectURL(blob);
      a.download = `專案管理錯題本_${stamp}.xls`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }
    function toggleWrongBook() {
      el('wrongCard').classList.toggle('hidden');
      if (!el('wrongCard').classList.contains('hidden')) el('wrongCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function render() {
      const setup = state.phase === 'setup';
      const quiz = state.phase === 'quiz';
      const finish = state.phase === 'finish';
      setVisible('setupView', setup);
      setVisible('statsPanel', quiz || finish);
      setVisible('quizCard', quiz);
      setVisible('finishCard', finish);
      if (setup) {
        renderSetupControls();
        updateSetupCount();
      } else if (quiz) {
        renderQuiz();
        renderWrongBook(false);
      } else if (finish) {
        renderFinish();
      }
    }
    function bindEvents() {
      el('selectAllBtn').addEventListener('click', () => { state.selectedKeys = [...ALL_KEYS]; saveState(); renderSourceChips(); updateSetupCount(); });
      el('clearAllBtn').addEventListener('click', () => { state.selectedKeys = []; saveState(); renderSourceChips(); updateSetupCount(); });
      el('startBtn').addEventListener('click', startQuiz);
      el('submitBtn').addEventListener('click', submitAnswer);
      el('nextBtn').addEventListener('click', nextQuestion);
      el('resetBtn').addEventListener('click', () => resetToSetup(true));
      el('restartFinishBtn').addEventListener('click', () => resetToSetup(false));
      el('exportWrongBtn').addEventListener('click', exportWrongExcel);
      el('exportWrongBtn2').addEventListener('click', exportWrongExcel);
      el('exportWrongBtn3').addEventListener('click', exportWrongExcel);
      el('practiceWrongBtn').addEventListener('click', startWrongPractice);
      el('practiceWrongBtn2').addEventListener('click', startWrongPractice);
      el('toggleWrongBtn').addEventListener('click', toggleWrongBook);
      el('clearWrongBtn').addEventListener('click', clearWrongBook);
      document.addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if (state.phase === 'quiz' && ['A','B','C','D','E'].includes(key) && !state.currentAnswer) {
          const q = currentQuestion();
          if (q.options.some(o => o.letter === key)) {
            state.selectedLetter = key;
            saveState();
            renderQuiz();
          }
        }
        if (state.phase === 'quiz' && e.key === 'Enter') {
          if (!state.currentAnswer && state.selectedLetter) submitAnswer();
          else if (state.currentAnswer) nextQuestion();
        }
      });
    }
    bindEvents();
    render();
  </script>
</body>
</html>
