","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"17","question":"請問PEST 分析的S 是指什麼意思?","options":[{"letter":"A","text":"社會(social)"},{"letter":"B","text":"安全(safety)"},{"letter":"C","text":"銷售(sale)"},{"letter":"D","text":"強處(strength)"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 社會(social)","answerSource":"原檔解答","note":"PEST 分析中,P 是指政治(political)、E 是指經濟(economic) 、S 是指社會 (social),T 是指技術(technological)。"},{"id":"IPMA-CH11-018","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"18","question":"請問SWOT 分析的S 是指什麼意思?","options":[{"letter":"A","text":"強處(strength)"},{"letter":"B","text":"結構(structure)"},{"letter":"C","text":"安全(safety)"},{"letter":"D","text":"明確(specific)"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 強處(strength)","answerSource":"原檔解答","note":"SWOT 分析中,S 是指強處(strength)、W 是指弱處(weakness) 、O 是指機會 (opportunity),T 是指威脅(threat)。"},{"id":"IPMA-CH11-019","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"19","question":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合,稱 為?","options":[{"letter":"A","text":"品質管理"},{"letter":"B","text":"專案組合管理"},{"letter":"C","text":"職業安全衛生管理"},{"letter":"D","text":"環境管理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案組合管理","answerSource":"原檔解答","note":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合,稱 為專案組合管理(project portofolio management)。"},{"id":"IPMA-CH11-020","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"20","question":"下列何者為專案組合管理的特徵?","options":[{"letter":"A","text":"僅只一個大型專案"},{"letter":"B","text":"僅只一個小型專案"},{"letter":"C","text":"多個專案彼此間絕對不可以有關聯性"},{"letter":"D","text":"由多個專案組成,彼此不一定有關聯性,而某些專案可能被其他專案取代"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 由多個專案組成,彼此不一定有關聯性,而某些專案可能被其他專案取代","answerSource":"原檔解答","note":"專案組合管理中的專案,彼此之間不一定有直接的關聯性。可能是由一個或 多個 大型專案和數個專案組成,即使是在定案之後,組合裡面的某些專案, 可能會被其他更有效益或是更緊急的專案所取代。"},{"id":"IPMA-CH11-021","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"21","question":"下列何者為專案組合管理的部分程序?","options":[{"letter":"A","text":"廣告規劃、廣告宣傳"},{"letter":"B","text":"通路規劃、人員訓練"},{"letter":"C","text":"專案篩選、專案排名"},{"letter":"D","text":"上市規劃、產品銷售"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案篩選、專案排名","answerSource":"原檔解答","note":"專案組合管理的程序為:定義組合管理、現況評估願景制定、專案篩選、專案 排名、專案核准、專案執行。"},{"id":"IPMA-CH11-022","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"22","question":"定義組合管理的範圍為以下何者?","options":[{"letter":"A","text":"涵蓋整個企業"},{"letter":"B","text":"少數幾個部門"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 以上皆是","answerSource":"原檔解答","note":"定義組合管理的範圍是涵蓋整個企業或是少數幾個部門。"},{"id":"IPMA-CH11-023","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"23","question":"下列何者為專案組合管理的特徵","options":[{"letter":"A","text":"減少意外事件發生風險、降低企業成本、提升企業社會及國際形象"},{"letter":"B","text":"為企業創造競爭優勢、解決困難、克服困難"},{"letter":"C","text":"維持既有利益與降低環境衝擊之間取得平衡"},{"letter":"D","text":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合","answerSource":"原檔解答","note":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合,稱 為專案組合管理(project portofolio management)。"},{"id":"IPMA-CH11-024","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"24","question":"下列何者”不為”專案組合管理的部分程序?","options":[{"letter":"A","text":"專案篩選、專案排名"},{"letter":"B","text":"產品概念、產品發展"},{"letter":"C","text":"專案核准、專案排名"},{"letter":"D","text":"專案執行、專案篩選"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 產品概念、產品發展","answerSource":"原檔解答","note":"專案組合管理的程序為:定義組合管理、現況評估願景制定、專案篩選、專案 排名、專案核准、專案執行。"},{"id":"IPMA-CH11-025","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"25","question":"下列何者為國際專案管理知識體系D 級認證課程的章節之一?","options":[{"letter":"A","text":"專案組合管理"},{"letter":"B","text":"研發專案管理"},{"letter":"C","text":"職業安全衛生管理"},{"letter":"D","text":"品質管理"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案組合管理","answerSource":"原檔解答","note":"國際專案管理知識體系第十一章為專案組合管理。"},{"id":"IPMA-CH11-026","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"26","question":"下列何者”不為”專案組合管理的特徵?","options":[{"letter":"A","text":"由多個專案組成,彼此不一定有關聯性"},{"letter":"B","text":"某些專案可能被其他專案取代"},{"letter":"C","text":"多個專案彼此間不一定有關聯性"},{"letter":"D","text":"僅只一個小型專案"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 僅只一個小型專案","answerSource":"原檔解答","note":"專案組合管理中的專案,彼此之間不一定有直接的關聯性。可能是由一個或 多個大型專案和數個專案組成,即使是在定案之後,組合裡面的某些專案, 可能會被其他更有效益或是更緊急的專案所取代。"},{"id":"IPMA-CH11-027","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"27","question":"SWOT 分析可以用來評估內外在環境,底下何者不是項目之一?","options":[{"letter":"A","text":"強處"},{"letter":"B","text":"機會"},{"letter":"C","text":"社會"},{"letter":"D","text":"威脅"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 社會","answerSource":"原檔解答","note":"SWOT 分析中,S 是指強處(strength)、W 是指弱處(weakness) 、O 是指機會 (opportunity),T 是指威脅(threat)。"},{"id":"IPMA-CH11-028","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"28","question":"組合管理必須使用哪一個評估模式,以確保所選出來的專案和組織策略目標 密切結合?","options":[{"letter":"A","text":"安全評估模式"},{"letter":"B","text":"財務評估模式"},{"letter":"C","text":"風險評估模式"},{"letter":"D","text":"管理評估模式"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 財務評估模式","answerSource":"原檔解答","note":"組合管理必須使用同一個財務評估模式,以確保所選出來的專案和組織策略 目標密切結合。"},{"id":"IPMA-CH11-029","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"29","question":"下列何者為專案組合管理適用的情況?","options":[{"letter":"A","text":"日常管理"},{"letter":"B","text":"僅只一個小型專案"},{"letter":"C","text":"僅只一個大型專案"},{"letter":"D","text":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合","answerSource":"原檔解答","note":"從所有的候選專案中,選擇一組對組織綜合投資報酬率最大的專案組合,稱 為專案組合管理(project portofolio management)。"},{"id":"IPMA-CH11-030","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"30","question":"在專案的貢獻度及急迫性排出執行順序之前,須審核每個專案的什麼?","options":[{"letter":"A","text":"專案報告"},{"letter":"B","text":"專案設計"},{"letter":"C","text":"專案源由"},{"letter":"D","text":"專案評估"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案源由","answerSource":"原檔解答","note":"在專案的貢獻度及急迫性排出執行順序之前,須審核每個專案的專案源由。"},{"id":"IPMA-CH12-001","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"1","question":"投入成本和回收效益的評估,以決定資源的投入順序和問題機會的取捨,這 樣的過程稱為?","options":[{"letter":"A","text":"專案可行性分析"},{"letter":"B","text":"專案管理方法"},{"letter":"C","text":"專案管理組織"},{"letter":"D","text":"專案管理概念"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案可行性分析","answerSource":"原檔解答","note":"組織資源的有限性,如果同時發生好幾個問題或是發現好幾種機會時,組織 就要對這些問題或機會,進行投入成本和回收效益的評估,以決定資源的投 入順序和問題機會的取捨,這樣的過程稱為專案可行性分析。"},{"id":"IPMA-CH12-002","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"2","question":"以下何者是組織過去專案的可行性評估資料可以作為參考,但是要注意時間 的差異和環境的變化?","options":[{"letter":"A","text":"可行性資料"},{"letter":"B","text":"歷史資料"},{"letter":"C","text":"專案源由"},{"letter":"D","text":"資料庫"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 歷史資料","answerSource":"原檔解答","note":"組織過去專案的可行性評估資料可以作為參考,但是要注意時間的差異和環 境的變化的相關資料稱為歷史資料。"},{"id":"IPMA-CH12-003","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"3","question":"以下哪些是專案可行性分析的分法?","options":[{"letter":"A","text":"技術可行性"},{"letter":"B","text":"管理可行性"},{"letter":"C","text":"經濟可行性"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案可行性分析的分法可以分為技術可行性、管理可行性、經意可行性、融 資可行性、政治可以行性、環境可行性、市場可行性、安全可行性、社會可 行性、文化可行性。"},{"id":"IPMA-CH12-004","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"4","question":"組織是否有執行專案所需要的技術是用哪一種專案可行性分析方法?","options":[{"letter":"A","text":"技術可行性"},{"letter":"B","text":"管理可行性"},{"letter":"C","text":"經濟可行性"},{"letter":"D","text":"文化可行性"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 技術可行性","answerSource":"原檔解答","note":"技術可行性是評估組織是否有執行專案所需要的技術。"},{"id":"IPMA-CH12-005","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"5","question":"組織是否有執行專案所需要的組織流程和管理架構是用哪一種專案可行性分 析方法?","options":[{"letter":"A","text":"技術可行性"},{"letter":"B","text":"管理可行性"},{"letter":"C","text":"經濟可行性"},{"letter":"D","text":"文化可行性"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 管理可行性","answerSource":"原檔解答","note":"管理可行性是評估組織是否有執行專案所需要的組織流程和管理架構。"},{"id":"IPMA-CH12-006","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"6","question":"經濟可行性包括下列哪些分析?","options":[{"letter":"A","text":"成本效益分析"},{"letter":"B","text":"損益平衡分析"},{"letter":"C","text":"無形和有形因素"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"評估專案獲利能力的方法包括有成本效益分析、損益平衡分析、無形和有形 因素考量。"},{"id":"IPMA-CH12-007","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"7","question":"對專案所需資金的可行性分析稱為?","options":[{"letter":"A","text":"融資可行性"},{"letter":"B","text":"管理可行性"},{"letter":"C","text":"經濟可行性"},{"letter":"D","text":"文化可行性"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 融資可行性","answerSource":"原檔解答","note":"融資可行性是專案所需資金的可行性分析。"},{"id":"IPMA-CH12-008","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"8","question":"對投資金額多,排擠效應大或是能見度高的專案,需要下列哪種專案可行性 分析的方法?","options":[{"letter":"A","text":"融資可行性"},{"letter":"B","text":"政治可行性"},{"letter":"C","text":"經濟可行性"},{"letter":"D","text":"文化可行性"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 政治可行性","answerSource":"原檔解答","note":"政治可行性是指對投資金額多,排擠效應大或是能見度高的專案,可能會因 為政治因素而被犧牲。"},{"id":"IPMA-CH12-009","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"9","question":"執行專案對環境所造成的影響是下列哪種專案可行性分析?","options":[{"letter":"A","text":"融資可行性"},{"letter":"B","text":"政治可行性"},{"letter":"C","text":"環境可行性"},{"letter":"D","text":"文化可行性"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 環境可行性","answerSource":"原檔解答","note":"環境可行性是評估是否對環境造成影響。"},{"id":"IPMA-CH12-010","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"10","question":"完整的經濟可行性分析應該包括哪些?","options":[{"letter":"A","text":"通貨膨脹、折舊、稅"},{"letter":"B","text":"成本、效益、歷史"},{"letter":"C","text":"基準、利率、篩選"},{"letter":"D","text":"歷史經驗、電腦工具、預測資料"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 通貨膨脹、折舊、稅","answerSource":"原檔解答","note":"完整的經濟可行性分析應該包括通貨膨漲(inflation)、折舊(depreciation)和稅 (taxation)等,如果專案牽涉到國際性的投資,那麼這三個因素的影響大小在 不同國家都會不一樣。"},{"id":"IPMA-CH12-011","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"11","question":"經濟可行性分析的步驟哪個錯誤?","options":[{"letter":"A","text":"分析選擇方案"},{"letter":"B","text":"呈現分析結果"},{"letter":"C","text":"風險分析"},{"letter":"D","text":"確認主要收入來源"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 確認主要收入來源","answerSource":"原檔解答","note":"經濟可行性分析的步驟如下 1.定義經濟可行性分析原則 2.估計成本及效益 3.確認主要成本來源 4.風險分析 5.分析選擇方案 6.呈現分析結果"},{"id":"IPMA-CH12-012","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"12","question":"經濟可行性分析的可能方案何者為是?","options":[{"letter":"A","text":"可行方案"},{"letter":"B","text":"技術概念"},{"letter":"C","text":"取得方式"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"經濟可行性分析的可能方案:可行方案、技術概念、取得方式、所需時程等。"},{"id":"IPMA-CH12-013","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"13","question":"經濟可能性分析輸入的是哪個資料?","options":[{"letter":"A","text":"成本資料"},{"letter":"B","text":"效益資料"},{"letter":"C","text":"歷史資料"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"成本資料:成本估計應該包括直接成本及間接成本,間接成本可以配合 ABC(activity-based costing)成本估計法,來提高估計的準確度。 效益資料:效益的估計應該包括有形及無形效益。 歷史資料:組織內部舊專案的成本效益分析資料可以作為參考。"},{"id":"IPMA-CH12-014","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"14","question":"成本估計方法哪個正確?","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"由下往上法"},{"letter":"C","text":"由上往下估計法"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"參數法(parametric method)-利用歷史資料找出成本和績效的數學關係式,來預 測目前專案成本。 類比法(analogy method)-適用於有過去類似專案資料的場合,以最類似的專案 來進行成本資料的調整,又稱為由上往下估計法。 由下往上法(bottom-up method)-由專案的WBS 底成開始,網上計算及加總人 力及其他資源的成本。"},{"id":"IPMA-CH12-015","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"15","question":"專案可行性分析裡面資料的精確度的誤差在多少以內?","options":[{"letter":"A","text":"+/-10%"},{"letter":"B","text":"+/-12%"},{"letter":"C","text":"+/-14%"},{"letter":"D","text":"+/-16%"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. +/-10%","answerSource":"原檔解答","note":"資料的精確度:專案可行性資料的精確度,會影響可行性分析的判斷。一般 來說,資料要精確到讓可行性分析的誤差在+/-10%以內。"},{"id":"IPMA-CH12-016","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"16","question":"下列4 種方法,那種不是經濟可行性的方法?","options":[{"letter":"A","text":"徳菲法"},{"letter":"B","text":"風險分析法"},{"letter":"C","text":"資料分析法"},{"letter":"D","text":"淨現值法"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 資料分析法","answerSource":"原檔解答","note":"經濟可行性的方法有淨現值法、內部報酬率法、回收年限法、德菲法、風險 分析法。"},{"id":"IPMA-CH12-017","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"17","question":"下列4 種方法,那種不是經濟可行性分析成本估計的方法?","options":[{"letter":"A","text":"類比法"},{"letter":"B","text":"由下往上法"},{"letter":"C","text":"參數法"},{"letter":"D","text":"回收年限法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 回收年限法","answerSource":"原檔解答","note":"成本資料的成本評估一般有參數法、類比法跟由下往上法。"},{"id":"IPMA-CH12-018","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"18","question":"下列4 種方法,那種不是風險分析的方法?","options":[{"letter":"A","text":"常數分析"},{"letter":"B","text":"備案分析"},{"letter":"C","text":"參數分析"},{"letter":"D","text":"敏感度分析"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 常數分析","answerSource":"原檔解答","note":"風險分析方法有備案分析、風險及不確定分析、敏感度分析、參數分析。"},{"id":"IPMA-CH12-019","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"19","question":"利用歷史資料找出成本和績效的數學關係式,來預測目前專案成本為?","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"回收年限法"},{"letter":"C","text":"由下往上法"},{"letter":"D","text":"類比法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 參數法","answerSource":"原檔解答","note":"參數法是利用歷史資料找出成本和績效的數學關係式,來預測專案成本。 20. .解答:B 淨現值為零的時候稱為內部報酬率法,IRR 值較大者為相對比較好的法案。"},{"id":"IPMA-CH12-021","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"21","question":"將每個方案的成本和支出,依照時間順序化成現金流量稱之為?","options":[{"letter":"A","text":"淨現值法"},{"letter":"B","text":"內部報酬率法"},{"letter":"C","text":"徳菲法"},{"letter":"D","text":"風險分析法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 淨現值法","answerSource":"原檔解答","note":"淨現值法是將每個方案的成本和支出,依照時間順序畫成現金流量。然後以 組織指定的利率,將所有成本和支出折現到目前的時間,稱為淨現值。越大 者為相對比較好的方案。"},{"id":"IPMA-CH12-022","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"22","question":"經濟可行性的文件內容不包含?","options":[{"letter":"A","text":"生命週期成本和效益"},{"letter":"B","text":"可能方案"},{"letter":"C","text":"分析結果"},{"letter":"D","text":"專案背景資料"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 分析結果","answerSource":"原檔解答","note":"經濟可行性的文件內容包括:專案背景資料、可能方案、生命週期成本和效 益。"},{"id":"IPMA-CH12-023","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"23","question":"下列何者不是經濟可行性分析的基本原則?","options":[{"letter":"A","text":"分析的方法"},{"letter":"B","text":"篩選的門檻"},{"letter":"C","text":"收益的考量"},{"letter":"D","text":"年限的基準"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 收益的考量","answerSource":"原檔解答","note":"經濟可行性的基本原則為分析的方法、年限的基準、利率的選擇、篩選的門 檻。"},{"id":"IPMA-CH12-024","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"24","question":"以下過程何者為專案可行性分析過程?","options":[{"letter":"A","text":"專案概念→專案草案→專案源由→專案發起。"},{"letter":"B","text":"專案發起→專案概念→專案源由→專案草案。"},{"letter":"C","text":"專案概念→專案發起→專案源由→專案草案。"},{"letter":"D","text":"專案源由→專案發起→專案概念→專案草案。"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案概念→專案草案→專案源由→專案發起。","answerSource":"原檔解答","note":"專案的初步是由概念行程草案確定符合組織的目標,所有通過的專案草案再 做成專案源由,說明該專案必須存在的理由。最後通過的所有專案就由組織 高層或專案推動委員會指定發起人,由發起人擬定專案授權書並交由指派的 專案經理,協同專案團隊進行專案計畫書的制定。"},{"id":"IPMA-CH12-025","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"25","question":"專案源由是?","options":[{"letter":"A","text":"說明為什麼需要執行該專案的理由。"},{"letter":"B","text":"執行此專案所需要的資料來源。"},{"letter":"C","text":"此專案概念的構想基礎。。"},{"letter":"D","text":"以上皆非。"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 說明為什麼需要執行該專案的理由。","answerSource":"原檔解答","note":"專案源由是詳細說明該專案必須存在的理由。"},{"id":"IPMA-CH12-026","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"26","question":"何為可行性資料?","options":[{"letter":"A","text":"說明為什麼要執行該專案的資料。"},{"letter":"B","text":"執行可行性分析所需要的相關資料。"},{"letter":"C","text":"組織過去專案的可行性評估資料。"},{"letter":"D","text":"以上皆是。"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 執行可行性分析所需要的相關資料。","answerSource":"原檔解答","note":"可行性資料是執行可行性分析所需要的相關資料。"},{"id":"IPMA-CH12-027","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"27","question":"下列何者為非?","options":[{"letter":"A","text":"可行性報告:專案可行性分析的產出是一個可行性分析報告。"},{"letter":"B","text":"資料精確度:一般來說,資料要精確到讓可行性分析的誤差在+/- 20%以 內。"},{"letter":"C","text":"可行性資料:執行可行性分析所需要的相關資料。"},{"letter":"D","text":"以上皆對。"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 資料精確度:一般來說,資料要精確到讓可行性分析的誤差在+/- 20%以 內。","answerSource":"原檔解答","note":"一般來說,資料要精確到讓可行性分析的誤差在+/- 10%以內。"},{"id":"IPMA-CH12-028","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"28","question":"何為經濟可行性分析?","options":[{"letter":"A","text":"取得專案所需資金的可行性分析,高資金需求的投資專案的主要問題。"},{"letter":"B","text":"是對指市場需求對專案潛在影響的分析,包括市場上的變化,產品價格的 波動等等。"},{"letter":"C","text":"指執行該專案對環境所造成的影響分析。"},{"letter":"D","text":"以上皆錯。"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆錯。","answerSource":"原檔解答","note":"經濟可行性分析:是用來評選不同規劃專案的一種方法,分析時主要考慮因 素可以量化的成本何收益。"},{"id":"IPMA-CH12-029","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"29","question":"何為經濟可行性分析的步驟?","options":[{"letter":"A","text":"估計成本及效益→確認主要成本來源→定義經濟可行性分析原則→分析 選擇方案→估計成本及效益→呈現分析結果。"},{"letter":"B","text":"定義經濟可行性分析原則→確認主要成本來源→風險分析→統計分析→ 估計成本及效益→呈現分析結果。"},{"letter":"C","text":"定義經濟可行性分析原則→估計成本及效益→確認主要成本來源→風險 分析→分析選擇方案→呈現分析結果。"},{"letter":"D","text":"確認主要成本來源→分析選擇方案→定義經濟可行性分析原則→風險分 析→呈現分析結果。"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 定義經濟可行性分析原則→估計成本及效益→確認主要成本來源→風險 分析→分析選擇方案→呈現分析結果。","answerSource":"原檔解答","note":"經濟可行性分析的步驟如下: 定義經濟可行性分析原則→估計成本及效益→確認主要成本來源→風險分析 →分析選擇方案→呈現分析結果。"},{"id":"IPMA-CH12-030","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"30","question":"下列何者不是風險分析常用的方法?","options":[{"letter":"A","text":"備案分析。"},{"letter":"B","text":"風險及不確定性分析。"},{"letter":"C","text":"參數分析。"},{"letter":"D","text":"統計資料分析。"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 統計資料分析。","answerSource":"原檔解答","note":"風險分析常用的方法有:備案分析、風險及不確定性分析、敏感度分析、參 數分析。"},{"id":"IPMA-CH12-031","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"31","question":"下列何者為專案可行性分析的方法?","options":[{"letter":"A","text":"技術可行性"},{"letter":"B","text":"環境可行性"},{"letter":"C","text":"文化可行性"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案可行性的方法包括有技術可行性、管理可行性、經濟可行性、融資可行 性、政治可行性、環境可行性、市場可行性、安全可行性、社會可行性、文 化可行性。"},{"id":"IPMA-CH12-032","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"32","question":"專案可行性資料的精確度可容許誤差範圍為下列何者?","options":[{"letter":"A","text":"+/- 5%"},{"letter":"B","text":"+/- 10%"},{"letter":"C","text":"+/- 15%"},{"letter":"D","text":". +/- 20%"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. +/- 10%","answerSource":"原檔解答","note":"專案可行性資料的精確度會影響可行性分析的判斷,一般來說,資料要精確 在誤差+/- 10%以內。"},{"id":"IPMA-CH12-033","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"33","question":"以下何者為完整的經濟可行性分析?","options":[{"letter":"A","text":"通貨膨脹"},{"letter":"B","text":"折舊"},{"letter":"C","text":"稅"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"通貨膨脹、折舊、稅賦問題在經濟可行性分析占有同等重要,尤其如果牽涉 到國際性的投資,那麼這三個因素的影響大小在不同國家都會不一樣。"},{"id":"IPMA-CH12-034","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"34","question":"何者不是成本估計的方法?","options":[{"letter":"A","text":"参數法"},{"letter":"B","text":"類比法"},{"letter":"C","text":"由上往下法"},{"letter":"D","text":"由左往右法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 由左往右法","answerSource":"原檔解答","note":"常用的成本估計法有参數法、類比法(由上往下法)、由下往上法三種。"},{"id":"IPMA-CH12-035","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"35","question":"選擇適當數量專家設計並寄出問卷,回收整理相同意見部分,不同意見的部 分再次設計並寄出問卷,反覆進行直到意見一致。試問這是何種經濟可行性 分析的方法?","options":[{"letter":"A","text":"淨現值法"},{"letter":"B","text":"內部報酬率法"},{"letter":"C","text":"回收年限法"},{"letter":"D","text":"德菲法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 德菲法","answerSource":"原檔解答","note":"淨現值法是將每個方案的成本和之初,依照時間順序畫成現金流量,然後依 組織指定的利率,將所有的成本和支出折現到目前的時間;當淨現值為零時 的利率稱回內部報酬率;而回收年限法是現金流量上所有成本和支出折現之 後相加,當加總值為零,也就是開始變為正值的年份。"},{"id":"IPMA-CH12-036","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"36","question":"何者為相對較好的方案?","options":[{"letter":"A","text":"NPV 大"},{"letter":"B","text":"IRR 值小"},{"letter":"C","text":"回收年限長"},{"letter":"D","text":"以上皆非"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. NPV 大","answerSource":"原檔解答","note":"NPV 為淨現值法,NPV 大者為相對較好的方案,IRR 為內部報酬率法,IRR 值大者也為相對較好的方案,而回收年限法則要短者為相對較好的方案。"},{"id":"IPMA-CH12-037","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"37","question":"經濟可行性分析的文件內容包括專案背景資料、可能方案、生命週期成本和 效益,其中的可能方案下列何者不包含?","options":[{"letter":"A","text":"可行方案"},{"letter":"B","text":"技術概念"},{"letter":"C","text":"取得方案"},{"letter":"D","text":"所需時程"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 取得方案","answerSource":"原檔解答","note":"可能方案包括有:可行方案、技術概念、取得方式、所需時程等。"},{"id":"IPMA-CH12-038","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"38","question":"下列何者不包含在生命週期成本和效益的文件裡?","options":[{"letter":"A","text":"風險分析"},{"letter":"B","text":"敏感度分析"},{"letter":"C","text":"定性分析"},{"letter":"D","text":"成本效益分析"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 定性分析","answerSource":"原檔解答","note":"生命週期成本和效益包括有:生命週期成本、生命週期效益、風險分析、敏 感度分析、成本效益分析等。"},{"id":"IPMA-CH12-039","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"39","question":"下列何者為正確的專案可行性分析過程?","options":[{"letter":"A","text":"專案概念→專案草案→專案源由→專案發起"},{"letter":"B","text":"專案概念→專案源由→專案草案→專案發起"},{"letter":"C","text":"專案源由→專案概念→專案草案→專案發起"},{"letter":"D","text":"專案源由→專案草案→專案概念→專案發起"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案概念→專案草案→專案源由→專案發起","answerSource":"原檔解答","note":"由專案的初步概念形成專案的草案,所有通過的草案再做成專案源由,然後 審核專案源由是否滿足所有專案關係人的期望,以及組織是否可以忍受其資 源需求,最後通過的所有專案就由組織高層或專案推動委員會指定發起人, 由發起人擬定專案授權書並交由指派的專案經理,協同專案團隊進行專案計 畫書的制定。"},{"id":"IPMA-CH12-040","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"40","question":"經濟可行性分析的第一步驟為何?","options":[{"letter":"A","text":"風險分析"},{"letter":"B","text":"確認主要成本來源"},{"letter":"C","text":"估計成本及效益"},{"letter":"D","text":"定義經濟可行性分析原則"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 定義經濟可行性分析原則","answerSource":"原檔解答","note":"經濟可行性分析步驟:1.定義經濟可行性分析原則 2.估計成本及效益 3.確認 主要成本來源 4.風險分析 5.分析選擇方案 6.呈現分析結果"},{"id":"IPMA-CH12-041","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"41","question":"所有通過的專案草案再做成什麼以詳細說明該專案必須存在的理由?","options":[{"letter":"A","text":"專案源由"},{"letter":"B","text":"專案發起"},{"letter":"C","text":"專案概念"},{"letter":"D","text":"專案概念書"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案源由","answerSource":"原檔解答","note":"所有通過的專案草案再做成專案源由,以詳細說明該專案必須存在的理由。"},{"id":"IPMA-CH12-042","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"42","question":"專案可行性分析的方法中,哪種可行性是取得專案所需資金的可行性分析?","options":[{"letter":"A","text":"經濟可行性"},{"letter":"B","text":"融資可行性"},{"letter":"C","text":"環境可行性"},{"letter":"D","text":"市場可行性"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 融資可行性","answerSource":"原檔解答","note":"專案的融資可行性是取得專案所需資金的可行性分析,專案融資常常是高資 金需求的投資專案的主要問題之ㄧ。"},{"id":"IPMA-CH12-043","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"43","question":"下列哪項是市場需求對專案的潛在影響?","options":[{"letter":"A","text":"市場需求的變化"},{"letter":"B","text":"競爭對手的動態"},{"letter":"C","text":"產品價格的波動"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案的市場可行性是指市場需求對專案的潛在影響,包括市場需求的變化、 競爭對手的動態、產品價格的波動等等"},{"id":"IPMA-CH12-044","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"44","question":"類比法又稱為?","options":[{"letter":"A","text":"由上往下法"},{"letter":"B","text":"由下往上法"},{"letter":"C","text":"由左往右法"},{"letter":"D","text":"由右往左法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 由上往下法","answerSource":"原檔解答","note":"類比法適用於有過去類似專案資料的場合,以最類似的專案來進行成本資 料的調整,又稱為由上往下估計法"},{"id":"IPMA-CH12-045","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"45","question":"取IRR 值大者為相對比較好的方案是指哪種方法?","options":[{"letter":"A","text":"淨現值法"},{"letter":"B","text":"回收年限法"},{"letter":"C","text":"德菲法"},{"letter":"D","text":"內部報酬率法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 內部報酬率法","answerSource":"原檔解答","note":"內部報酬率法;淨現值為零時的利率稱為內部報酬率(IRR),IRR 值大者為相 對比較好的方案。"},{"id":"IPMA-CH12-046","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"46","question":"以下何者為常用的成本估計方法?","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"類比法"},{"letter":"C","text":"由下往上法"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"成本估計應該包括直接成本及間接成本,間接成本可以配合使用ABC (activity-based costing)成本估計法,來提高估計的準確度。常用的成本估計方 法有:參數法、類比法、由下往上法。"},{"id":"IPMA-CH12-047","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"47","question":"以下何者非專案可行性的報告內容?","options":[{"letter":"A","text":"專案背景"},{"letter":"B","text":"可能方案"},{"letter":"C","text":"初步建議"},{"letter":"D","text":"以上皆非"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆非","answerSource":"原檔解答","note":"專案可行性分析的產出是一個可行性分析的報告。可行性評估報告的內容 有:專案背景、問題或機會描述、可能方案、初步建議、相關人員簽署以及 最後的決定等。"},{"id":"IPMA-CH12-048","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"48","question":"間接成本可以配合使用下列哪種成本估計法,來提高估計的準確度?","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"類比法"},{"letter":"C","text":"由下往上法"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"間接成本可以配合使用ABC(activity-based costing)成本估計法,來提高估計 的準確度。常用的成本估計方法有:參數法、類比法、由下往上法。"},{"id":"IPMA-CH12-049","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"49","question":"何者為用來評選不同規劃專案的一種方法,分析時主要考慮的因素是可以量 化的成本和收益?","options":[{"letter":"A","text":"經濟可行性分析"},{"letter":"B","text":"融資可行性分析"},{"letter":"C","text":"市場可行性分析"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 經濟可行性分析","answerSource":"原檔解答","note":"經濟可行性分析是用來評選不同規劃專案的一種方法,分析時主要考慮的因 素是可以量化的成本和收益。"},{"id":"IPMA-CH12-050","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"50","question":"將每個方案的成本和支出,依照時間順序畫成現金流量,稱為?","options":[{"letter":"A","text":"回收年限法"},{"letter":"B","text":"德菲法"},{"letter":"C","text":"內部報酬率法"},{"letter":"D","text":"淨現值法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 淨現值法","answerSource":"原檔解答","note":"淨現值法:將每個方案的成本和支出,依照時間順序畫成現金流量。然後以 組織指定的利率,將所有的成本和支出折現到目前的時間,稱為淨現值 (NPV)。"},{"id":"IPMA-CH12-051","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"51","question":"淨現值為零時的利率稱為內部報酬率(IRR),IRR 值如何時為相對比較好的方 案?","options":[{"letter":"A","text":"IRR 值大者"},{"letter":"B","text":"IRR 值小者"},{"letter":"C","text":"沒有差別"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. IRR 值大者","answerSource":"原檔解答","note":"淨現值為零時的利率稱為內部報酬率(IRR),IRR 值大者為相對比較好的方 案。"},{"id":"IPMA-CH12-052","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"52","question":"何者為德菲法的優點?","options":[{"letter":"A","text":"專家不碰面"},{"letter":"B","text":"時間花費短"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專家不碰面","answerSource":"原檔解答","note":"德菲法的優點是專家不碰面,不會互相影響,缺點是可能花費很長時間。"},{"id":"IPMA-CH12-053","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"53","question":"下列何者不是完整的經濟可行性分析?","options":[{"letter":"A","text":"通貨膨脹"},{"letter":"B","text":"國民生產淨額"},{"letter":"C","text":"折舊"},{"letter":"D","text":"稅"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 國民生產淨額","answerSource":"原檔解答","note":"完整的經濟可行性分析應該包括通貨膨脹、折舊和稅等。"},{"id":"IPMA-CH12-054","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"54","question":"以下何者為風險分析的方法?","options":[{"letter":"A","text":"備案分析"},{"letter":"B","text":"風險及不確定性分析"},{"letter":"C","text":"敏感度分析"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"風險分析的方法有:備案分析、風險及不確定性分析、敏感度分析、參數分 析。"},{"id":"IPMA-CH12-055","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"55","question":"何者可用來提高分析的精確度?","options":[{"letter":"A","text":"參考資料"},{"letter":"B","text":"電腦工具"},{"letter":"C","text":"經濟預測資料"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"參考資料、電腦工具、歷史經驗、經濟預測資料都可用來提高分析的精確度。"},{"id":"IPMA-CH12-056","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"56","question":"為了確保所有效益都被認出來可利用什麼法則?來獲得所有效益的清單。","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"德菲法"},{"letter":"C","text":"類比法"},{"letter":"D","text":"由上往下法"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 德菲法","answerSource":"原檔解答","note":"德菲法,因為效益的估計包含有形跟無形效益。"},{"id":"IPMA-CH12-057","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"57","question":"下列何者為可行性報告評估的內容?","options":[{"letter":"A","text":"專案背景"},{"letter":"B","text":"機會描述"},{"letter":"C","text":"相關人員簽暑"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"可行性評估報告內容包括專案背景、問題或機會描述、可能方案初步建議、 相關人員簽暑以及最後的決定等。"},{"id":"IPMA-CH12-058","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"58","question":"何者為德菲法的缺點?","options":[{"letter":"A","text":"花費很長的時間"},{"letter":"B","text":"會互相影響"},{"letter":"C","text":"無法當面談"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 花費很長的時間","answerSource":"原檔解答","note":"德菲法的優點是專家不碰面,不會互相影響,缺點是可能花費很長時間。"},{"id":"IPMA-CH12-059","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"59","question":"淨現值(NPV)較如何為比較好的方案?","options":[{"letter":"A","text":"大"},{"letter":"B","text":"小"},{"letter":"C","text":"不一定"},{"letter":"D","text":"不相關"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 大","answerSource":"原檔解答","note":"淨現值是將所有的成本和支出折現到目前的時間,所以越大者相對比較好。"},{"id":"IPMA-CH12-060","category":"IPMA自我評量","source":"Chapter 12 專案可行性分析.pdf","section":"Chapter 12","originalNo":"60","question":"下列何種成本估計方法是利用歷史資料找出成本和績效的數學關係式來預 測目前專案成本?","options":[{"letter":"A","text":"參數法"},{"letter":"B","text":"德菲法"},{"letter":"C","text":"類比法"},{"letter":"D","text":"由上往下法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 參數法","answerSource":"原檔解答","note":"參數法是利用歷史資料找出成本和績效的數學關係式來預測目前專案成本。"},{"id":"IPMA-CH13-001","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"1","question":"負責擬定專案概念書為何者?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案團隊成員"},{"letter":"C","text":"專案關係人及客戶"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"為了整合所有相關意見,草擬概念書須有專案經理,專案主要成員及專案關 係人及客戶一起參與概念發展,以提高專案成功機率。"},{"id":"IPMA-CH13-002","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"2","question":"專案概念書是在哪一階段制定?","options":[{"letter":"A","text":"發起"},{"letter":"B","text":"規劃"},{"letter":"C","text":"執行"},{"letter":"D","text":"控制"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 發起","answerSource":"原檔解答","note":"專案概念書的制定是專案發起階段最重要的工作事項,是專案授權書擬定的 依據。"},{"id":"IPMA-CH13-003","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"3","question":"在專案概念階段主要工作項目及進度時程的估計精度大約為?","options":[{"letter":"A","text":"+/-100%間"},{"letter":"B","text":"+/-75%間"},{"letter":"C","text":"+/-50%間"},{"letter":"D","text":"+/-25%間"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. +/-25%間","answerSource":"原檔解答","note":"專案概念階段的時程估計精確度大約在+/-25%之間。"},{"id":"IPMA-CH13-004","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"4","question":"專案發起階段因為各種因官莊況都還混沌不明,因此都有可能發生以下問題?","options":[{"letter":"A","text":"專案團隊有無力感"},{"letter":"B","text":"資源不足"},{"letter":"C","text":"欠缺領導"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案發起階段因為各種因官莊況都還混沌不明,因此都有可能發生以下問題: 專案團隊有無力感、資源不足、欠缺領導、欠缺高階管理層的支持、客戶需 求還沒決定、對專案目標沒有共識、企業策略和專案目標沒有連結。"},{"id":"IPMA-CH13-005","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"5","question":"專案團隊可用下列方法產生專案的概念?","options":[{"letter":"A","text":"腦力激盪"},{"letter":"B","text":"管理層會議"},{"letter":"C","text":"關係人會議"},{"letter":"D","text":"以上皆可"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆可","answerSource":"原檔解答","note":"腦力激盪、管理層會議、關係人會議、產品說明書、專案可行性說明、專家 訪 談皆可使用來產生專案的概念。"},{"id":"IPMA-CH13-006","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"6","question":"專案授權書是再專案哪一階段制定?","options":[{"letter":"A","text":"規劃"},{"letter":"B","text":"執行"},{"letter":"C","text":"發起"},{"letter":"D","text":"結束"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 發起","answerSource":"原檔解答","note":"專案授權書是組織正式宣告一個專案的開始,在發起階段制定。"},{"id":"IPMA-CH13-007","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"7","question":"專案授權書由誰制定?","options":[{"letter":"A","text":"專案委員會"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"專案客戶"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案發起人","answerSource":"原檔解答","note":"專案授權書在發起階段由專案發起人制定。"},{"id":"IPMA-CH13-008","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"8","question":"專案授權書的要點為何?","options":[{"letter":"A","text":"由專案發起人發出"},{"letter":"B","text":"在專案授權書中須指定專案經理"},{"letter":"C","text":"必須說明專案經理和發起人之間的權責關係,以確保專案經理無法解決問 題時,可以循管理機制得到支援。"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案授權書有三個要點,因為執行過程必須很多解決問題的決策,因此定義 好授權等級及協調機制,有助於專案的順利進行。"},{"id":"IPMA-CH13-009","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"9","question":"專案成員以及所以專案關係人在專案發起、規劃、執行、控制及結束階段的 角色及責任分配,會依據下列因素而有不同?","options":[{"letter":"A","text":"組織大小"},{"letter":"B","text":"專案大小"},{"letter":"C","text":"專案成員的能力"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"組織的大小、專案的大小、執行中的專案總數量、專案成員的能力、組織專 案管理成熟度都會因為這些因素而讓專案成員以及所以專案關係人在專案發 起、規劃、執行、控制及結束階段的角色及責任分配有所不同。"},{"id":"IPMA-CH13-010","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"10","question":"哪些是專案概念書的主要內容?","options":[{"letter":"A","text":"專案背景"},{"letter":"B","text":"專案目的"},{"letter":"C","text":"產品說明"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案概念書的主要內容是專案背景、專案目的、產品說明、關鍵成功因素、 專案策略、進度目標、財務目標。"},{"id":"IPMA-CH13-011","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"11","question":"專案預算得估計值,估計精度大約為?","options":[{"letter":"A","text":"+/-100%間"},{"letter":"B","text":"+/-75%間"},{"letter":"C","text":"+/-50%間"},{"letter":"D","text":"+/-25%間"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. +/-25%間","answerSource":"原檔解答","note":"專案預算得估計值,估計精度大約+/-25%間。"},{"id":"IPMA-CH13-012","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"12","question":"專案授權有三個要點哪個正確?","options":[{"letter":"A","text":"專案授書由專案發起人發出"},{"letter":"B","text":"專案授權書中必須指定專案經理"},{"letter":"C","text":"專案授書必須說明專案經理和發起人之間的權責關係,以確保專案經理無 法解決問題時,可以循管理機制得到支援。"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案授權有三個要點:專案授書由專案發起人發出、專案授權書中必須指定專 案經、專案授書必須說明專案經理和發起人之間的權責關係,以確保專案經 理無法解決問題時,可以循管理機制得到支援。"},{"id":"IPMA-CH13-013","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"13","question":"哪一個是產品說明的內容?","options":[{"letter":"A","text":"描述專案產品的特徵及目的"},{"letter":"B","text":"專案的相關背景資料"},{"letter":"C","text":"參閱關鍵成功因素一節"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 描述專案產品的特徵及目的","answerSource":"原檔解答","note":"產品說明的內容是描述專案產品的特徵及目的。"},{"id":"IPMA-CH13-014","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"14","question":"哪一個是專案背景的內容?","options":[{"letter":"A","text":"述專案產品的特徵及目的"},{"letter":"B","text":"專案的相關背景資料"},{"letter":"C","text":"參閱關鍵成功因素一節"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案的相關背景資料","answerSource":"原檔解答","note":"專案背景的內容是專案的相關背景資料。"},{"id":"IPMA-CH13-015","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"15","question":"哪一個是關鍵成功因素的內容?","options":[{"letter":"A","text":"描述專案產品的特徵及目的"},{"letter":"B","text":"專案的相關背景資料"},{"letter":"C","text":"參閱關鍵成功因素一節"},{"letter":"D","text":"以上皆是"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 參閱關鍵成功因素一節","answerSource":"原檔解答","note":"關鍵成功因素的內容是參閱關鍵成功因素一節。"},{"id":"IPMA-CH13-016","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"16","question":"專案發起的主要目的是為了澄清有關專案的什麼面向?","options":[{"letter":"A","text":"要做什麼"},{"letter":"B","text":"為什麼要做"},{"letter":"C","text":"如何做"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案發起的主要目的是為了澄清有關專案的要做什麼、為什麼要做,及如何 做三個面向。"},{"id":"IPMA-CH13-017","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"17","question":"專案發起階段,何者正確?","options":[{"letter":"A","text":"規劃→發起→執行→結束"},{"letter":"B","text":"規劃→執行→發起→結束"},{"letter":"C","text":"發起→執行→規劃→結束"},{"letter":"D","text":"發起→規劃→執行→結束"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 發起→規劃→執行→結束","answerSource":"原檔解答","note":"專案的階段為 發起→規劃→執行→結束。"},{"id":"IPMA-CH13-018","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"18","question":"專案的一開始 ,會因為什麼尚未建立,而易變成多頭?","options":[{"letter":"A","text":"溝通機制"},{"letter":"B","text":"專案策略"},{"letter":"C","text":"進度目標"},{"letter":"D","text":"財務目標"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 溝通機制","answerSource":"原檔解答","note":"專案的一開始 ,會因為溝通機制尚未建立,而易變成多頭。"},{"id":"IPMA-CH13-019","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"19","question":"可行性的主要內容為何?","options":[{"letter":"A","text":"組織問題的描繪"},{"letter":"B","text":"解決方法的概述"},{"letter":"C","text":"浮潛在方案的說明"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"可行性的主要內容為組織問題的描繪,解決方法的概述,浮潛在方案的說明。"},{"id":"IPMA-CH13-020","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"20","question":"專案授權書是在哪個階段結束和哪個階段開始前發出?","options":[{"letter":"A","text":"發起、執行"},{"letter":"B","text":"發起、規劃"},{"letter":"C","text":"規劃、執行"},{"letter":"D","text":"控制、規劃"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 發起、規劃","answerSource":"原檔解答","note":"發起是專案經過評估可行,由高層指定的專案發起人草擬專案授權書,再交付 給指派的專案經理後,專案進入發起階段。規劃是專案經理街道專案授權書之 後,協同團隊進行專案計畫書的制定,也就是規劃如何執行專案,才能圓滿達成 專案發起人所給定的專案目標。"},{"id":"IPMA-CH13-021","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"21","question":"關於專案授權書的主要內容 , 何者不是?","options":[{"letter":"A","text":"專案背景"},{"letter":"B","text":"專案目的"},{"letter":"C","text":"專案規劃"},{"letter":"D","text":"專案的範圍"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案規劃","answerSource":"原檔解答","note":"專案授權書的主要四點是 專案背景、專案目的、專案目標、專案範圍。"},{"id":"IPMA-CH13-022","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"22","question":"產品說明書是包含在專案概念書裡的一個產品的概念書說明文件 , 他描述了 專案的什麼?","options":[{"letter":"A","text":"背景及財務目標"},{"letter":"B","text":"特徵及目的"},{"letter":"C","text":"策略及進度目標"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 特徵及目的","answerSource":"原檔解答","note":"產品說明書是包含在專案概念書裡的一個產品的概念書說明文件 , 描述了 專案的背景及財務目標、特徵及目的、策略及進度目標。"},{"id":"IPMA-CH13-023","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"23","question":"專案發起階段步驟下列何者正確?","options":[{"letter":"A","text":"專案概念書→可行性分析→規劃→專案授權書"},{"letter":"B","text":"專案概念書→可行性分析→專案授權書→規劃"},{"letter":"C","text":"專案授權書→可行性分析→規劃→專案概念書"},{"letter":"D","text":"專案授權書→規劃→可行性分析→專案概念書"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案概念書→可行性分析→專案授權書→規劃","answerSource":"原檔解答","note":"專案發起階段步驟為專案概念書→可行性分析→專案授權書→規劃"},{"id":"IPMA-CH13-024","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"24","question":"而專案發起階段會因為各種相關狀況都還混沌不明 ,發生何種情況?","options":[{"letter":"A","text":"專案團隊有無力感"},{"letter":"B","text":"資源不足"},{"letter":"C","text":"欠缺領導"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"而專案發起階段會因為各種相關狀況都還混沌不明 ,發生專案團隊有無力 感、資源不足、欠缺領導等情況。"},{"id":"IPMA-CH13-025","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"25","question":"專案發起階段間主要工作事項包括?","options":[{"letter":"A","text":"產品說明書的制定"},{"letter":"B","text":"專案概念書的制定"},{"letter":"C","text":"專案的可行性分析"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案發起階段間主要工作事項包括產品說明書的制定、專案概念書的制定、 專案的可行性分析、專案授權書的制定。"},{"id":"IPMA-CH13-026","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"26","question":"專案授權書發出之前必須要有哪些類似專案評估的文件?","options":[{"letter":"A","text":"專案可行性分析"},{"letter":"B","text":"專案概念書"},{"letter":"C","text":"產品說明書"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案授權書發出之前必須要有專案可行性分析、專案概念書、產品說明書等 類似專案評估的文件。"},{"id":"IPMA-CH13-027","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"27","question":"誰應該在專案計畫擬定過程間對專案計畫書的內容負責","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案成員"},{"letter":"C","text":"部門經理"},{"letter":"D","text":"專案發起人"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案經理","answerSource":"原檔解答","note":"專案經理通常由專案推動委員會指派,負責專案每天的管哩,包括資源調配、計 畫建力、計畫執行。"},{"id":"IPMA-CH13-028","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"28","question":"可行性分析的目的為何?","options":[{"letter":"A","text":"出專案的限制"},{"letter":"B","text":"找出專案的目標"},{"letter":"C","text":"找出專案的預算"},{"letter":"D","text":"找出專案的策略"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 出專案的限制","answerSource":"原檔解答","note":"可行性分析的目的為找出專案的限制。"},{"id":"IPMA-CH13-029","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"29","question":"產品說明書在發起的階段只能是一個粗略的文件,還必須在專案的哪一階段 才能逐步的詳實?","options":[{"letter":"A","text":"規劃階段"},{"letter":"B","text":"執行階段"},{"letter":"C","text":"控制階段"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 規劃階段","answerSource":"原檔解答","note":"產品說明書在發起的階段只能是一個粗略的文件,還必須在專案的規劃階段 才能逐步的詳實。"},{"id":"IPMA-CH13-030","category":"IPMA自我評量","source":"Chapter 13 專案發起.pdf","section":"Chapter 13","originalNo":"30","question":"專案計畫書的制定是以什麼為根據?","options":[{"letter":"A","text":"專案的概念書"},{"letter":"B","text":"產品說明書"},{"letter":"C","text":"專案授權書"},{"letter":"D","text":"競標書"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案授權書","answerSource":"原檔解答","note":"專案授權書是在發起階段結束和規劃階段開始前發出,主要的目的是正是發 布一個新專案的啟動,專案授權書發出之前,必須要有專案評估得類似文件,例 如專案可行性分析,專案概念書,專案源由或是其他可以確認專案的來源,並且 獲得高階管理層核准的文件。"},{"id":"IPMA-CH14-001","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"1","question":"以下何者為專案計畫必須具備的特點?","options":[{"letter":"A","text":"獨特性"},{"letter":"B","text":"動態性"},{"letter":"C","text":"及時性"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案計畫必須具備的特點有獨特性、動態性、彈性、及時性、主導性。"},{"id":"IPMA-CH14-002","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"2","question":"以下何者為專案目標必須滿足的條件?","options":[{"letter":"A","text":"明確"},{"letter":"B","text":"可衡量"},{"letter":"C","text":"可達成"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案目標是指專案期望成果的說明,它是由客戶或是專案發起人所指定,用 來衡量專案是否圓滿成功的標準。專案目標必須滿足明確、可衡量、可達成、 實際而且是有期限等五大要件。"},{"id":"IPMA-CH14-003","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"3","question":"下列何者不是專案範圍規劃中的方法?","options":[{"letter":"A","text":"產品分析"},{"letter":"B","text":"客戶需求分析"},{"letter":"C","text":"執行方案確認"},{"letter":"D","text":"專家諮詢"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 客戶需求分析","answerSource":"原檔解答","note":"專案範圍規劃中的方法包含產品分析、專家諮詢、執行方案確認、關係人分 析。"},{"id":"IPMA-CH14-004","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"4","question":"以下何者為工作分解結構(WBS)中工作包拆解的過程?","options":[{"letter":"A","text":"拆解細項產品成活動"},{"letter":"B","text":"判斷能否準確估計工時及成本"},{"letter":"C","text":"判斷能否進行管理"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"工作包拆解細項產品成為必須執行的活動,其過程有a.拆解細項產品成活動 b.判斷能否準確估計工時及成本c.判斷能否進行管理d.沒問題即結束,有問 題則回到步驟a。"},{"id":"IPMA-CH14-005","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"5","question":"組織分解結構(OBS)的每一個負責人或負責單位所必須要清楚定義的有?","options":[{"letter":"A","text":"工作授權範圍"},{"letter":"B","text":"主要的責任"},{"letter":"C","text":"和其他單位的報告和協調關係"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"組織分解結構(OBS)的每一個負責人或負責單位必須清楚定義的有目標可 以驗證、工作授權範圍、主要的責任、和其他單位的報告和協調關係。"},{"id":"IPMA-CH14-006","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"6","question":"以下何者為專案規劃階段主要的工作項目?","options":[{"letter":"A","text":"專案目標的確定"},{"letter":"B","text":"專案範圍的決定"},{"letter":"C","text":"工作分解結構(WBS)的展開"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案規劃階段的主要工作項目有專案目標的確定、專案範圍的決定、工作分 解結構(WBS)的展開、專案組織分解結構(OBS)的展開、活動定義及排 序、工時估計......。"},{"id":"IPMA-CH14-007","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"7","question":"工時估計裡的類比估計法,又稱為什麼估計法?","options":[{"letter":"A","text":"由下往上估計法"},{"letter":"B","text":"由上往下估計法"},{"letter":"C","text":"由左往右估計法"},{"letter":"D","text":"由右往左估計法"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 由上往下估計法","answerSource":"原檔解答","note":"以過去組織內部舊案的工時資料,做為目前專案工時估計的基礎,又稱為由 上往下估計法。(P.79)"},{"id":"IPMA-CH14-008","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"8","question":"下列何者不是進階呈現注意事項裡的繪製方法?","options":[{"letter":"A","text":"網路圖"},{"letter":"B","text":"魚骨圖"},{"letter":"C","text":"甘特圖"},{"letter":"D","text":"里程碑圖"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 魚骨圖","answerSource":"原檔解答","note":"專案進度的繪製有網路圖,甘特圖和里程碑圖三種,網路圖又分為箭頭式網 路圖和節點式網路圖,其中以節點式網路圖比較廣泛使用。(P.81)"},{"id":"IPMA-CH14-009","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"9","question":"PDM 法是一種以節點代表活動,箭頭代表活動順序關係的繪圖方法,畫出來 的圖稱為節點式網路圖又稱什麼網路圖?","options":[{"letter":"A","text":"AOA"},{"letter":"B","text":"ADM"},{"letter":"C","text":"AON"},{"letter":"D","text":"AOM"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. AON","answerSource":"原檔解答","note":"(P.74)"},{"id":"IPMA-CH14-010","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"10","question":"ADM 法是一種以箭頭代表活動,節點代表活動順序關係的繪圖方法,畫出來 的圖稱為箭頭式網路圖,又稱什麼網路圖?","options":[{"letter":"A","text":"AOA"},{"letter":"B","text":"AON"},{"letter":"C","text":"AOM"},{"letter":"D","text":"PDM"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. AOA","answerSource":"原檔解答","note":"(P.74)"},{"id":"IPMA-CH14-011","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"11","question":".認為人性會因為保護自己,而膨脹並浪費活動的公石,因此應該刪減活動的 工期估計值,刪減值加總後做成專案緩衝和進入緩衝,這是什麼理論?","options":[{"letter":"A","text":"假設理論"},{"letter":"B","text":"蒙地卡羅模擬"},{"letter":"C","text":"膨脹理論"},{"letter":"D","text":"限制理論"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 限制理論","answerSource":"原檔解答","note":"(P.85)"},{"id":"IPMA-CH14-012","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"12","question":"依照活動資源需求和組織資源的可用性,估計所有需要執行的活動是什麼?","options":[{"letter":"A","text":"工時估計"},{"letter":"B","text":"工時壓縮"},{"letter":"C","text":"進度基準"},{"letter":"D","text":"蒙地卡羅模擬"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 工時估計","answerSource":"原檔解答","note":"(P.78)"},{"id":"IPMA-CH14-013","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"13","question":"由WBS 架構逐像估計每一個活動的成本,然後加總得到的專案的總成本,是 哪種估計法?","options":[{"letter":"A","text":"由上而下估計法"},{"letter":"B","text":"由下而上估計法"},{"letter":"C","text":"由左而右估計法"},{"letter":"D","text":"由右而左估計法"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 由下而上估計法","answerSource":"原檔解答","note":"由下而上估計法是由WBS 架構逐像估計每一個活動的成本,然後往上加總 得到的專案的總成本。(P.96)"},{"id":"IPMA-CH14-014","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"14","question":".類比估計是以過去舊的專案的歷史資料為基礎,來推論現有專案的預算,因 為是抓一個總數再往下分攤,因此又稱什麼估計法?","options":[{"letter":"A","text":"由上而下估計法"},{"letter":"B","text":"由下而上估計法"},{"letter":"C","text":"由左而右估計法"},{"letter":"D","text":"由右而左估計法"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 由上而下估計法","answerSource":"原檔解答","note":"(P.99)"},{"id": 工很少;單位生產力高。"},{"letter":"C","text":"組織所定的品質決策會決定專案品質規劃的績效與業績。"},{"letter":"D","text":"組織做好專案的知識管理,可以累積最好的專案管理實務。"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 分析品質喊成本之間的關係,成本應該包括有形成本和無形成本。","answerSource":"原檔解答","note":"(3)組織品質決策: 組織所定的品質決策會決定專案品質規劃的走向與內容。 (p.112)"},{"id":"IPMA-CH14-025","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"25","question":"以下何者為將專案品質的管制流程,設計成條列式的詢問表格,以方便品質 保證或品質管制人員查驗專案的品質?","options":[{"letter":"A","text":"產出"},{"letter":"B","text":"查檢表"},{"letter":"C","text":"限制假設"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 查檢表","answerSource":"原檔解答","note":"查檢表才是為將專案品質的管制流程,設計成條列式的詢問表格,以方便品 質保證或品質管制人員查驗專案的品質。"},{"id":"IPMA-CH14-026","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"26","question":"在溝通規畫裡以下何者不為其八個象限?","options":[{"letter":"A","text":"進度"},{"letter":"B","text":"空間"},{"letter":"C","text":"文化"},{"letter":"D","text":"時間"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 進度","answerSource":"原檔解答","note":"專案規劃裡的偷通規劃為時間、空間、文化的八個象限。"},{"id":"IPMA-CH14-027","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"27","question":"專案關係人希望用甚麼方式提供他所要的訊息,例如參加會議、書面報告等 等?","options":[{"letter":"A","text":"溝通時機"},{"letter":"B","text":"WBS"},{"letter":"C","text":"溝通需求"},{"letter":"D","text":"溝通方法"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 溝通方法","answerSource":"原檔解答","note":"溝通方法為專案關係人希望用甚麼方式提供他所要的訊息,例如參加會議、 書面報告等等。"},{"id":"IPMA-CH14-028","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"28","question":"關係人分析是被歸列為屬於下列何者?","options":[{"letter":"A","text":"方法"},{"letter":"B","text":"產出"},{"letter":"C","text":"輸入"},{"letter":"D","text":"限制假設"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 方法","answerSource":"原檔解答","note":"在溝通規畫方法中的\"方法\"共有關係人分析與溝通需求分析兩者。"},{"id":"IPMA-CH14-029","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"29","question":"哪一項為綜合分析所有溝通需求的種類及方式。例如進度會議必須通知哪些 人參加?","options":[{"letter":"A","text":"關係人分析"},{"letter":"B","text":"溝通需求分析"},{"letter":"C","text":"專案人分析"},{"letter":"D","text":"需求分析"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 溝通需求分析","answerSource":"原檔解答","note":"溝通需求分析才是為綜合分析所有溝通需求的種類及方式。例如進度會議必 須通知哪些人參加。"},{"id":"IPMA-CH14-030","category":"IPMA自我評量","source":"Chapter 14 專案規劃.pdf","section":"Chapter 14","originalNo":"30","question":"下列何者為專案成員分散在不同地域是專案溝通的限制?","options":[{"letter":"A","text":"現有溝通系統"},{"letter":"B","text":"組織保密政策"},{"letter":"C","text":"虛擬團隊"},{"letter":"D","text":"專案訊息"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 虛擬團隊","answerSource":"原檔解答","note":"虛擬團隊為專案成員分散在不同地域是專案溝通的限制。"},{"id":"IPMA-CH15-001","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"1","question":"下列何者為專案執行階段的主要工作事項?","options":[{"letter":"A","text":"人員招募"},{"letter":"B","text":"資訊傳遞"},{"letter":"C","text":"計畫修正"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案執行階段的主要工作事項包括:執行專案計畫、計畫修正、品質保證、 資訊傳遞、績效監督、風險監控、問題管理、人員招募、人員訓練、招標、 供應商選擇、安全維護。P.143"},{"id":"IPMA-CH15-002","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"2","question":"下列何者非執行專案計畫的方法?","options":[{"letter":"A","text":"工作授權系統"},{"letter":"B","text":"變更管制系統"},{"letter":"C","text":"問題解決技巧"},{"letter":"D","text":"管理方法"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 變更管制系統","answerSource":"原檔解答","note":"執行專案計畫的方法有工作授權系統、組織工作流程、現況審查會議、問題 解決技巧、管理方法。P.146"},{"id":"IPMA-CH15-003","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"3","question":"下列何者為執行專案計畫的限制與假設?","options":[{"letter":"A","text":"預算限制"},{"letter":"B","text":"時程限制"},{"letter":"C","text":"不確定性"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"執行專案計畫的限制與假設有:預算限制、時程限制、品質限制、不確定性。 P.146"},{"id":"IPMA-CH15-004","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"4","question":"執行專案計畫的產出變更要求中,當工作結果顯示專案的進度、成本、品質 或範圍發生重大差距時,相關單位或個人可以提出變更要求,但是必須經過 何者同意?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案經理"},{"letter":"C","text":"變更管制委員會"},{"letter":"D","text":"客戶"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 變更管制委員會","answerSource":"原檔解答","note":"執行專案計畫的產出變更要求中,當工作結果顯示專案的進度、成本、品質 或範圍發生重大差距時,相關單位或個人可以提出變更要求,但是必須經過 變更管制委員會的同意。P.147"},{"id":"IPMA-CH15-005","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"5","question":"下列何者非專案計畫修正的方法?","options":[{"letter":"A","text":"工作授權系統"},{"letter":"B","text":"變更管制系統"},{"letter":"C","text":"型態管理系統"},{"letter":"D","text":"績效衡量系統"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 工作授權系統","answerSource":"原檔解答","note":"專案計畫修正的方法有:變更管制系統、型態管理系統、績效衡量系統。P.149"},{"id":"IPMA-CH15-006","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"6","question":"執行專案計畫的重點是確保所有的活動,且何者需定期和專案團隊及專案關 係人互動,以確定所有人員依照專案計畫進行?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案經理"},{"letter":"C","text":"客戶"},{"letter":"D","text":"供應商"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案經理","answerSource":"原檔解答","note":"執行專案計畫的重點是確保所有的活動,且專案經理需定期和專案團隊及專 案關係人互動,以確定所有人員依照專案計畫進行。P.145"},{"id":"IPMA-CH15-007","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"7","question":"專案因為各種原因而必須提出的變更請求,有關專案進度、成本、品質和範 圍的變更,要經過何者的同意,重大的變更還要通知專案關係人?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案經理"},{"letter":"C","text":"變更管制委員會"},{"letter":"D","text":"客戶"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 變更管制委員會","answerSource":"原檔解答","note":"專案因為各種原因而必須提出的變更請求,有關專案進度、成本、品質和範 圍的變更,要經過變更管制委員會的同意,重大的變更還要通知專案關係人。 P.149"},{"id":"IPMA-CH15-008","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"8","question":"下列何者為專案品質的最高表現?","options":[{"letter":"A","text":"效率高"},{"letter":"B","text":"重工少"},{"letter":"C","text":"成本低"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案品質的最高表現是效率高、成本低、重工少,而且客戶高度滿意。P.152"},{"id":"IPMA-CH15-009","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"9","question":"下列何者可用來預測潛在品質問題的發生機率以便事先採取預防措施?","options":[{"letter":"A","text":"效應分析"},{"letter":"B","text":"流程分析"},{"letter":"C","text":"品質稽查"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 效應分析","answerSource":"原檔解答","note":"失效模式與效應分析,可預測潛在品質問題的發生機率、品管難以察覺的機 率以及發生之後的嚴重性大小,以便事先採取預防措施。P.152"},{"id":"IPMA-CH15-010","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"10","question":"下列何者是分析專案的實際工作結果和原定專案基準之間的差異?","options":[{"letter":"A","text":"績效審查"},{"letter":"B","text":"差異分析"},{"letter":"C","text":"趨勢分析"},{"letter":"D","text":"淨值分析"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 差異分析","answerSource":"原檔解答","note":"績效審查:績效審查是專案績效最直接的監督方式,通常是以會議方式進 行,由相關活動的負責人報告,並邀請相關的專案關係人列席詢答。 差異分析:差異分析是分析專案工作的實際工作結果,和原定專案基準之間 的差異分析的內容可涵蓋專案的進度、成本、範圍、品質以及風險等方面。 趨勢分析:趨勢分析是分析專案在進度、成本、範圍、品質和風險等方面的 績效,是越來越好還是越來越差。 掙值分析:掙值分析是利用計畫值、掙值和實際值之間的關係,來發掘專案 的執行績效。P.156"},{"id":"IPMA-CH15-011","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"11","question":"下列何者是分析專案在進度、成本、範圍、品質和風險等方面的執行績效?","options":[{"letter":"A","text":"趨勢分析"},{"letter":"B","text":"淨值分析"},{"letter":"C","text":"績效審查"},{"letter":"D","text":"差異分析"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 趨勢分析","answerSource":"原檔解答","note":"績效審查:績效審查是專案績效最直接的監督方式,通常是以會議方式進行, 由相關活動的負責人報告,並邀請相關的專案關係人列席詢答。 差異分析:差異分析是分析專案工作的實際工作結果,和原定專案基準之間 的差異分析的內容可涵蓋專案的進度、成本、範圍、品質以及風險等方面。 趨勢分析:趨勢分析是分析專案在進度、成本、範圍、品質和風險等方面的 績效,是越來越好還是越來越差。 掙值分析:掙值分析是利用計畫值、掙值和實際值之間的關係,來發掘專案 的執行績效。P.156"},{"id":"IPMA-CH15-012","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"12","question":"下列何者不是用來發掘專案的執行績效?","options":[{"letter":"A","text":"計畫值"},{"letter":"B","text":"淨值"},{"letter":"C","text":"實際值"},{"letter":"D","text":"差異值"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 差異值","answerSource":"原檔解答","note":"掙值分析:掙值分析是利用計畫值、掙值和實際值之間的關係,來發掘專案 的執行績效。P.156"},{"id":"IPMA-CH15-013","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"13","question":"下列何者表示進度超前?","options":[{"letter":"A","text":"CV>0"},{"letter":"B","text":"SV>0"},{"letter":"C","text":"SV=EV-PV"},{"letter":"D","text":"CV=EV-AC"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. SV>0","answerSource":"原檔解答","note":"CV>0(成本低支)。 SV>0(進度超前)。 SV=EV-PV(專案進度的差異)。 CV=EV-AC(專案成本的差異)。P.156"},{"id":"IPMA-CH15-014","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"14","question":"下列何者是狀態分析專案目前的現況?","options":[{"letter":"A","text":"技術績效"},{"letter":"B","text":"重大問題"},{"letter":"C","text":"主要風險"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"狀態分析是分析專案目前的現況,包括技術績效、重大問題、主要風險等議 題。P.156"},{"id":"IPMA-CH15-015","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"15","question":"下列何者為專案經理在專案進行的過程中最重要工作?","options":[{"letter":"A","text":"溝通"},{"letter":"B","text":"監督"},{"letter":"C","text":"採購"},{"letter":"D","text":"以上皆是"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 溝通","answerSource":"原檔解答","note":"專案經理在專案進行的過程中,大約花了90%的時間在做溝通,因此溝通技 巧為專案經理在專案團隊資訊傳遞的必要能力之ㄧ。P.154"},{"id":"IPMA-CH15-016","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"16","question":"下列何者為引發風險的導因?","options":[{"letter":"A","text":"風險因應計畫"},{"letter":"B","text":"風險管理計畫"},{"letter":"C","text":"範圍變更"},{"letter":"D","text":"風險審查"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 範圍變更","answerSource":"原檔解答","note":"專案範圍變更常常是引發風險產生的原因之一,應該嚴密審查範圍變更的關 聯性,例如軟體專案中多加了一個功能,看起來差異不大,其實可能會引發 其他問題。P.159"},{"id":"IPMA-CH15-017","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"17","question":"風險監督之方法不包括下列何者?","options":[{"letter":"A","text":"因應措施稽核"},{"letter":"B","text":"掙值分析"},{"letter":"C","text":"技術績效分析"},{"letter":"D","text":"專案績效分析"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 專案績效分析","answerSource":"原檔解答","note":"風險監督之方法包括:風險審查、因應措施稽查、掙值分析、技術績效分析、 風險儲備分析。P.159"},{"id":"IPMA-CH15-018","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"18","question":"若因先前沒有規劃到,所以在風險監督的過程中才發現風險,此時該如何解 決來加以因應?","options":[{"letter":"A","text":"專案管理計畫變更"},{"letter":"B","text":"補救計畫"},{"letter":"C","text":"糾正措施"},{"letter":"D","text":"變更要求"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 補救計畫","answerSource":"原檔解答","note":"在風險監督過程才發現的風險,因為之前沒有規劃到,因此要擬定一個補救 計畫來加以因應。P.159"},{"id":"IPMA-CH15-019","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"19","question":"綜合專案管理的問題通常分為四種,類型、發生的時間點、發生的來源、問 題的影響,那麼請問造成專案進度落後之問題該屬於何種範圍?","options":[{"letter":"A","text":"類型"},{"letter":"B","text":"發生的時間點"},{"letter":"C","text":"發生的來源"},{"letter":"D","text":"問題的影響"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 問題的影響","answerSource":"原檔解答","note":"由問題的影響來分有:造成進度落後的問題、成本超支的問題、品質不良的 問題、人員安全的問題或是範圍變更的問題。P.160"},{"id":"IPMA-CH15-020","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"20","question":"為了有效管理專案問題,專案團隊應該制定標準的問題管理文件,其內容 包括下列何者?","options":[{"letter":"A","text":"問題背景資料"},{"letter":"B","text":"期初建議"},{"letter":"C","text":"管理決策"},{"letter":"D","text":"簽署"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 期初建議","answerSource":"原檔解答","note":"專案團隊制定標準的問題管理文件內容包括:問題背景資料、最後建議、管 理決策、簽署。P.160"},{"id":"IPMA-CH15-021","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"21","question":"在問題管理的方法中,何者可避免重大問題的發生?","options":[{"letter":"A","text":"專案績效分析"},{"letter":"B","text":"問題分析與解決"},{"letter":"C","text":"衝突管理技術"},{"letter":"D","text":"議題管理技術"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 議題管理技術","answerSource":"原檔解答","note":"議題(issues)是指潛在的問題,如果沒有處理好,可能會造成專案無法圓滿達 成原定目標,因此管理好議題可以避免重大問題的發生。P.162"},{"id":"IPMA-CH15-022","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"22","question":"問題管理最後產出的結果不可能有下列何者?","options":[{"letter":"A","text":"預防措施"},{"letter":"B","text":"補救計畫"},{"letter":"C","text":"經驗教訓"},{"letter":"D","text":"變更要求"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 補救計畫","answerSource":"原檔解答","note":"問題管理產出的結果有:問題解決、預防措施、糾正措施、經驗教訓、變更 要求。P.162"},{"id":"IPMA-CH15-023","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"23","question":"人員招募的重點應注意下列何者?","options":[{"letter":"A","text":"技術專長"},{"letter":"B","text":"工作態度"},{"letter":"C","text":"人格特質"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"人員招募的重點除了人員必須具備應有的技術專長之外,還要特別注意人員 的工作態度和人格特質,尤其是和一群人共同完成任務的能力。P.163"},{"id":"IPMA-CH15-024","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"24","question":"人員訓練最大的障礙為下列何者?","options":[{"letter":"A","text":"人員素質低落"},{"letter":"B","text":"性別年齡差異"},{"letter":"C","text":"語言文化差異"},{"letter":"D","text":"以上皆是"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 語言文化差異","answerSource":"原檔解答","note":"人員訓練最大的障礙之一就是成員來自不同的時間和空間,甚至是不同的文 化和語言。P.165"},{"id":"IPMA-CH15-025","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"25","question":"何者可將專案管理的經驗教訓和最佳實務訓速的轉移到相關的專案成員身 上,人員訓練的效果就可以明顯提高?","options":[{"letter":"A","text":"專案知識管理系統"},{"letter":"B","text":"模擬器材"},{"letter":"C","text":"線上課程"},{"letter":"D","text":"面授課程"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案知識管理系統","answerSource":"原檔解答","note":"組織建立專案的知識管理系統(project knowledge management system),可以 將專案管理的經驗教訓和最佳實務迅速轉移到相關的專案成員身上,人員訓 練的效果就可以顯著提高。P.166"},{"id":"IPMA-CH15-026","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"26","question":"招標是透過廣告及召開說明會的方式,取得潛在供應商或包商的報價或是執 行細節的一個過程,如果技術不是問題,通常只要求報價,但如果有執行上 的技術難度,則可以在報價之外要求供應商或包商提出什麼?","options":[{"letter":"A","text":"報告書"},{"letter":"B","text":"建議書"},{"letter":"C","text":"說明書"},{"letter":"D","text":"保證書"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 建議書","answerSource":"原檔解答","note":"在技術上有難度時,可要求包商或供應商提出執行上的說明,也就是建議書 (proposal),以證實他們確實有能力完成招標的產品或服務,此外,建議書的 詳細程度和可行性變成是選擇包商或供應商的重點。P.167"},{"id":"IPMA-CH15-027","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"27","question":"何者是選擇包商或供應商的重要依據?","options":[{"letter":"A","text":"報價"},{"letter":"B","text":"建議書"},{"letter":"C","text":"投標廠商的過去記錄"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"我們將所有投標的供應商或包商的報價和建議書中,選擇最適合專案的供應 商或包商,但除了報價和建議書的比較之外,專案團隊也可以把投標廠商的 過去記錄,財務能力,及其客戶評價等列入考量。P.169"},{"id":"IPMA-CH15-028","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"28","question":"在選擇供應商的方法中,必須透過下列何者來了解有關的權利義務?","options":[{"letter":"A","text":"權重系統"},{"letter":"B","text":"篩選系統"},{"letter":"C","text":"合約談判"},{"letter":"D","text":"核算最低成本"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 合約談判","answerSource":"原檔解答","note":"我們在最後選定的包商或供應商進行合約條款的協商及談判,特別是有關權 利義務,付款罰則及風險分攤的部分都要說明清楚。P.170"},{"id":"IPMA-CH15-029","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"29","question":"何謂合約管理計畫?","options":[{"letter":"A","text":"合約簽署後,若想變更就必須經由合約管理計畫的程序更動"},{"letter":"B","text":"說明合約從訂立到結束的管理方式和規定"},{"letter":"C","text":"說明合約談判到簽署合約的過程"},{"letter":"D","text":"以上皆否"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 說明合約從訂立到結束的管理方式和規定","answerSource":"原檔解答","note":"合約管理計畫即為說明合約從訂立到結束的管理方式和規定。P.170"},{"id":"IPMA-CH15-030","category":"IPMA自我評量","source":"Chapter 15 專案執行.pdf","section":"Chapter 15","originalNo":"30","question":"何者非安全維護的產出結果?","options":[{"letter":"A","text":"糾正措施"},{"letter":"B","text":"經驗教訓"},{"letter":"C","text":"風險資料庫"},{"letter":"D","text":"變更要求"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 風險資料庫","answerSource":"原檔解答","note":"安全維護的產出結果包括:安全管理計畫變更、糾正措施、經驗教訓、安全 資料庫、變更要求。P.172"},{"id":"IPMA-CH16-001","category":"IPMA自我評量","source":"Chapter 16 專案控制.pdf","section":"Chapter 16","originalNo":"1","question":"專案團隊是否依照專案計畫的內容執行,或是專案團隊依照計畫執行的績效 如何,有賴於專案的何種機制發揮功能?","options":[{"letter":"A","text":"規劃"},{"letter":"B","text":"執行"},{"letter":"C","text":"控制"},{"letter":"D","text":"以上皆非"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆非","answerSource":"原檔解答","note":"專案團隊是否依照專案計畫的內容執行,或是專案團隊依照計畫執行的績效 如何,有賴於專案控制機制的發揮功能。P.173"},{"id":"IPMA-CH16-002","category":"IPMA自我評量","source":"Chapter 16 專案控制.pdf","section":"Chapter 16","originalNo":"2","question":"專案控制階段的主要工作事項包括?","options":[{"letter":"A","text":"狀況審查"},{"letter":"B","text":"變更控制"},{"letter":"C","text":"範圍控制"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"專案控制階段的主要工作事項包括: 狀況審查、變更控制、範圍控制、進度 控制、風險控制、品質控制、成本控制、範圍驗證、合約管理。P.173"},{"id":"IPMA-CH16-003","category":"IPMA自我評量","source":"Chapter 16 專案控制.pdf","section":"Chapter 16","originalNo":"3","question":"狀況審查的目的是讓哪些專案關係人了解專案的進度,並針對發生的問題討 論解決方案?","options":[{"letter":"A","text":"專案團隊"},{"letter":"B","text":"包商"},{"letter":"C","text":"專案發起人"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"狀況審查的目的是讓專案團隊、包商、專案發起人、組織高層及其他專案關 係人了解專案的進度,並針對發生的問題討論解決方案P.175"},{"id":"IPMA-CH16-004","category":"IPMA自我評量","source":"Chapter 16 專案控制.pdf","section":"Chapter 16","originalNo":"4","question":"狀況審查中方法中下列何者不是所需的內容?","options":[{"lett
