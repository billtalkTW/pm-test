<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案管理題庫測驗｜2064題｜</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #17213a;
      --muted: #647084;
      --line: #dedbd2;
      --soft: #f2efe8;
      --brand: #152f5f;
      --brand-2: #244b8e;
      --accent: #b36b00;
      --good: #147d42;
      --bad: #b42318;
      --good-bg: #eaf7ef;
      --bad-bg: #fff0ee;
      --warn-bg: #fff7dc;
      --shadow: 0 16px 36px rgba(23, 33, 58, .10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at top left, #eef3ff 0, var(--bg) 42%, #fbfaf7 100%);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(250, 248, 244, .92);
      border-bottom: 1px solid rgba(222, 219, 210, .8);
      backdrop-filter: blur(10px);
    }
    .top-inner { max-width: 1040px; margin: 0 auto; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; gap: 12px; align-items: center; }
    .logo { width: 34px; height: 34px; border-radius: 10px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 900; }
    .brand-title { font-size: 18px; font-weight: 900; margin: 0; }
    .brand-sub { margin: -4px 0 0; color: var(--muted); font-size: 12px; }
    .top-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mini-progress { display: flex; align-items: center; gap: 8px; color: #30425f; font-weight: 800; }
    .mini-track { width: 126px; height: 7px; background: #dedbd2; border-radius: 99px; overflow: hidden; }
    .mini-bar { height: 100%; width: 0%; background: var(--brand); transition: width .2s ease; }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 24px 18px 56px; }
    h1 { font-size: clamp(25px, 3vw, 38px); margin: 0 0 6px; letter-spacing: .02em; }
    h2 { font-size: 18px; margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
    .step { display: inline-flex; width: 24px; height: 24px; align-items: center; justify-content: center; border-radius: 7px; color: #fff; background: var(--brand); font-size: 13px; }
    .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 15px; max-width: 820px; }
    .panel, .quiz-card, .finish-card, .wrong-card {
      background: rgba(255,255,255,.93);
      border: 1px solid rgba(222, 219, 210, .95);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .panel { padding: 20px 22px; margin-bottom: 18px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .section-title { color: var(--accent); font-weight: 900; font-size: 14px; margin: 16px 0 8px; padding-top: 12px; border-top: 1px solid var(--line); }
    .source-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid var(--line);
      background: var(--soft);
      color: #22324d;
      border-radius: 12px;
      padding: 9px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      user-select: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .chip:hover { transform: translateY(-1px); border-color: #b8aa91; }
    .chip input { display: none; }
    .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .count { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 20px; padding: 0 7px; border-radius: 999px; background: rgba(100,112,132,.14); color: #647084; font-size: 12px; font-weight: 900; }
    .chip.active .count { background: rgba(255,255,255,.18); color: #fff; }
    .quick-btn, button, .seg-btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, opacity .12s ease;
      font-family: inherit;
      font-size: 14px;
    }
    button:hover, .quick-btn:hover, .seg-btn:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .primary { background: var(--brand); color: #fff; }
    .primary:hover { background: var(--brand-2); }
    .secondary { background: #e9edf5; color: #20314d; }
    .danger { background: #fff0ee; color: var(--bad); }
    .ghost { background: transparent; color: var(--accent); }
    .seg-group { display: flex; flex-wrap: wrap; width: fit-content; border: 1px solid var(--line); background: var(--soft); border-radius: 14px; padding: 5px; gap: 5px; }
    .seg-btn { background: transparent; color: #20314d; min-width: 74px; }
    .seg-btn.active { background: #fff; box-shadow: 0 4px 12px rgba(23,33,58,.10); color: var(--brand); }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
    .setting-label { color: var(--muted); font-size: 13px; margin: 0 0 7px; font-weight: 800; }
    .custom-count { width: 110px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line); font: inherit; font-weight: 800; background: #fff; }
    .start-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
    .start-main { padding: 14px 24px; font-size: 17px; box-shadow: 0 12px 24px rgba(21,47,95,.18); }
    .summary-line { color: var(--muted); font-size: 14px; font-weight: 800; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
    .stat { background: #f8fafc; border: 1px solid var(--line); border-radius: 14px; padding: 12px; min-height: 72px; }
    .stat .label { font-size: 12px; color: var(--muted); }
    .stat .value { font-size: 24px; font-weight: 900; margin-top: 2px; }
    .progress { height: 12px; background: #e8edf5; border-radius: 999px; overflow: hidden; margin-top: 14px; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--brand), #7c3aed); transition: width .25s ease; }
    .quiz-card { padding: clamp(18px, 3vw, 30px); }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; background: #eef2ff; color: #3042a0; font-size: 12px; font-weight: 800; }
    .pill.gray { background: #f1f5f9; color: #475569; }
    .question { font-size: clamp(19px, 2.2vw, 25px); font-weight: 900; margin: 8px 0 18px; white-space: pre-wrap; }
    .options { display: grid; gap: 10px; margin: 10px 0 18px; }
    .option {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: start;
      border: 1.5px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 13px 14px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select: none;
    }
    .option:hover { transform: translateY(-1px); border-color: #9ab0ff; }
    .option input { display: none; }
    .letter {
      width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
      font-weight: 900; color: #334155; background: #eef2f7; border: 1px solid #d8e1ef;
    }
    .opt-text { padding-top: 1px; white-space: pre-wrap; }
    .option.selected { border-color: var(--brand); background: #f4f7ff; }
    .option.selected .letter { background: var(--brand); color: #fff; border-color: var(--brand); }
    .option.correct { border-color: #47b881; background: var(--good-bg); }
    .option.correct .letter { background: var(--good); color: #fff; border-color: var(--good); }
    .option.wrong { border-color: #f04438; background: var(--bad-bg); }
    .option.wrong .letter { background: var(--bad); color: #fff; border-color: var(--bad); }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .feedback {
      margin: 16px 0 14px; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--line);
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.good { background: var(--good-bg); border-color: #a5dfb8; color: #0f5a31; }
    .feedback.bad { background: var(--bad-bg); border-color: #ffc2bb; color: #8a1f14; }
    .feedback .title { font-weight: 900; font-size: 17px; }
    .source-box { margin-top: 12px; padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px dashed #cbd5e1; color: #475569; font-size: 13px; }
    .explain-box { margin-top: 12px; padding: 12px 14px; border-radius: 12px; background: #fff7dc; border: 1px solid #ffe59a; color: #704900; }
    .explain-box .explain-title { font-weight: 900; margin-bottom: 4px; }
    .finish-card, .wrong-card { padding: 24px; margin-top: 18px; }
    .finish-title { font-size: 28px; font-weight: 900; margin-bottom: 6px; }
    .small { color: var(--muted); font-size: 13px; }
    .warning { background: var(--warn-bg); color: #704900; border: 1px solid #ffe59a; border-radius: 14px; padding: 12px 14px; margin-top: 12px; font-size: 14px; }
    .wrong-list { display: grid; gap: 12px; margin-top: 14px; }
    .wrong-item { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fff; }
    .wrong-title { font-weight: 900; margin-bottom: 6px; }
    .wrong-meta { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .hidden { display: none !important; }
    @media (max-width: 760px) {
      .top-inner { align-items: flex-start; flex-direction: column; }
      .top-tools { justify-content: flex-start; }
      .settings-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .stat:last-child { grid-column: span 2; }
      .option { grid-template-columns: 38px 1fr; padding: 12px; }
      .mini-track { width: 90px; }
    }
    @media print {
      body { background: #fff; }
      .topbar, .panel, .controls, .source-box { display: none !important; }
      .quiz-card, .finish-card, .wrong-card { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="top-inner">
      <div class="brand">
        <div class="logo">PM</div>
        <div>
          <p class="brand-title">專案管理題庫測驗</p>
          <p class="brand-sub">來源選擇・隨機/順序</p>
        </div>
      </div>
      <div class="top-tools">
        <div class="mini-progress"><span id="topProgressText">0 / 0</span><div class="mini-track"><div class="mini-bar" id="topProgressBar"></div></div></div>
        <button class="secondary" id="toggleWrongBtn" type="button">查看錯題本</button>
        <button class="secondary" id="exportWrongBtn" type="button">匯出錯題 Excel</button>
        <button class="danger" id="resetBtn" type="button">結束重來</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <section id="setupView">
      <h1>專案管理題庫測驗</h1>
      <p class="subtitle">共 2064 題。可選擇題目來源、出題順序或隨機、題目數量；答錯會自動加入錯題本，並可匯出成 Excel 可開啟的檔案。</p>

      <div class="panel">
        <h2><span class="step">1</span>選擇練習範圍</h2>
        <div class="row" style="justify-content: space-between;">
          <div class="row" id="quickCategoryBtns"></div>
          <div class="row">
            <button class="ghost" type="button" id="selectAllBtn">全選</button>
            <button class="ghost" type="button" id="clearAllBtn">清除</button>
          </div>
        </div>
        <div id="sourceGroups"></div>
      </div>

      <div class="panel">
        <h2><span class="step">2</span>練習設定</h2>
        <div class="settings-grid">
          <div>
            <p class="setting-label">出題順序</p>
            <div class="seg-group" id="orderGroup">
              <button type="button" class="seg-btn active" data-order="random">隨機抽題</button>
              <button type="button" class="seg-btn" data-order="sequential">順序練習</button>
            </div>
          </div>
          <div>
            <p class="setting-label">題數</p>
            <div class="row">
              <div class="seg-group" id="amountGroup">
                <button type="button" class="seg-btn active" data-amount="10">10</button>
                <button type="button" class="seg-btn" data-amount="20">20</button>
                <button type="button" class="seg-btn" data-amount="30">30</button>
                <button type="button" class="seg-btn" data-amount="50">50</button>
                <button type="button" class="seg-btn" data-amount="all">全部</button>
              </div>
              <input class="custom-count" id="customAmount" type="number" min="1" placeholder="自訂" />
            </div>
          </div>
        </div>
        <div class="start-row">
          <button class="primary start-main" id="startBtn" type="button">開始練習 →</button>
          <span class="summary-line" id="setupSummary">已選 0 題，可出 0 題</span>
        </div>
        <div class="warning">如果選「全部」且來源全選，會把 2064 題全部排入同一輪；隨機模式只會改變順序，不會重複抽題。</div>
      </div>
    </section>

    <section class="panel hidden" id="statsPanel">
      <div class="stats">
        <div class="stat"><div class="label">目前題號</div><div class="value" id="currentStat">0 / 0</div></div>
        <div class="stat"><div class="label">已答</div><div class="value" id="answeredStat">0</div></div>
        <div class="stat"><div class="label">答對</div><div class="value" id="correctStat">0</div></div>
        <div class="stat"><div class="label">答錯</div><div class="value" id="wrongStat">0</div></div>
        <div class="stat"><div class="label">正確率</div><div class="value" id="accuracyStat">0%</div></div>
      </div>
      <div class="progress"><div class="bar" id="progressBar"></div></div>
      <div class="warning" id="resumeHint">進度會自動存到這個瀏覽器。關掉檔案後再打開，會從上次位置繼續。</div>
    </section>

    <main class="quiz-card hidden" id="quizCard">
      <div class="meta-row" id="metaRow"></div>
      <div class="question" id="questionText"></div>
      <form class="options" id="optionsForm"></form>
      <div class="feedback" id="feedbackBox"></div>
      <div class="controls">
        <button class="primary" id="submitBtn" type="button" disabled>送出答案</button>
        <button class="secondary hidden" id="nextBtn" type="button">下一題</button>
      </div>
      <div class="source-box" id="sourceBox"></div>
    </main>

    <section class="finish-card hidden" id="finishCard">
      <div class="finish-title">本輪練習完成</div>
      <p id="finishSummary"></p>
      <div class="controls" style="justify-content:center; margin-top: 14px;">
        <button class="primary" id="restartFinishBtn" type="button">重新設定新一輪</button>
        <button class="secondary" id="practiceWrongBtn" type="button">只練錯題</button>
        <button class="secondary" id="exportWrongBtn2" type="button">匯出錯題 Excel</button>
      </div>
    </section>

    <section class="wrong-card hidden" id="wrongCard">
      <h2><span class="step">錯</span>錯題本</h2>
      <p class="small" id="wrongSummary">目前沒有錯題。</p>
      <div class="controls">
        <button class="secondary" id="practiceWrongBtn2" type="button">只練目前錯題</button>
        <button class="secondary" id="exportWrongBtn3" type="button">匯出錯題 Excel</button>
        <button class="danger" id="clearWrongBtn" type="button">清空錯題本</button>
      </div>
      <div class="wrong-list" id="wrongList"></div>
    </section>
  </div>

category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"4","question":"下列何者需利用一群彼此相關且必須協調運作的專案,來達成組織到目標?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"大型專案"},{"letter":"C","text":"大型專案管理"},{"letter":"D","text":"組合管理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 大型專案","answerSource":"原檔解答","note":"大型專案(Program)係指一群彼此相關而且必須協調運作的專案,完成後會達 成組織的既定策略性目標。"},{"id":"IPMA-CH01-005","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"5","question":"下列何者需利用系統化和結構化的方法來管理一群彼此互相關聯的專案?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"大型專案"},{"letter":"C","text":"大型專案管理"},{"letter":"D","text":"組合管理"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 大型專案管理","answerSource":"原檔解答","note":"大型專案管理(Program Management)係指利用有效的管理制度和流程,以系統 化和結構化的方法來管理一群彼此互相關聯的專案,達成組織的策略性目標。"},{"id":"IPMA-CH01-006","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"6","question":"何者需有效管理組織內的大型專案及一般專案,並考慮所有的機會與資源 下,以最有成本效益來達成目標。","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"大型專案"},{"letter":"C","text":"大型專案管理"},{"letter":"D","text":"組合管理"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 組合管理","answerSource":"原檔解答","note":"組合管理(Portfolio Management)係指考慮在所有可能的機會和有限的資源 下,有效管理組織內的大型專案及一般專案,並以最有成本效益的方式達成 企業的策略目標。"},{"id":"IPMA-CH01-007","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"7","question":"下列何者非為專案管理的三大要素?","options":[{"letter":"A","text":"時程"},{"letter":"B","text":"品質"},{"letter":"C","text":"成本"},{"letter":"D","text":"範圍"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 範圍","answerSource":"原檔解答","note":"專案管理的三大要素包含時程、成本、品質。"},{"id":"IPMA-CH01-008","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"8","question":"下列何者不是專案的主要關鍵成功因素?","options":[{"letter":"A","text":"高階主管支持專案"},{"letter":"B","text":"專案計畫清楚可行"},{"letter":"C","text":"有效管理專案的溝通"},{"letter":"D","text":"部門主管管理能力"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 部門主管管理能力","answerSource":"原檔解答","note":"專案的最主要關鍵成功因素包含:(1)高階主管支持專案(2)專案目標明確(3) 專案計畫清楚可行(4)專案關係人管理妥當(5)專案成員的專長分佈平均(6)有 效管理專案的溝通(7)專案經理管理能力。"},{"id":"IPMA-CH01-009","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"9","question":"關鍵成功因素分析文件應包含什麼資料?","options":[{"letter":"A","text":"專案背景"},{"letter":"B","text":"成員"},{"letter":"C","text":"時間"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"關鍵成功因素的分析文件應該包含專案背景資料、關鍵成功因素、專案負責 人員、預定完成日期、實際完成日期(完成後填入)、成功因素沒有達成所產 生的影響、及其他建議等。"},{"id":"IPMA-CH01-010","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"10","question":"下列何者係指組織執行專案所處的內外在環境?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"組合管理"},{"letter":"C","text":"大型專案"},{"letter":"D","text":"專案環境"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 專案環境","answerSource":"原檔解答","note":"專案環境是指組織執行專案所處的內外在環境。"},{"id":"IPMA-CH01-011","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"11","question":"影響專案成敗最直接的因素為?","options":[{"letter":"A","text":"專案成員的專案管理能力"},{"letter":"B","text":"組織專案管理制度成熟度"},{"letter":"C","text":"以上皆是"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 以上皆是","answerSource":"原檔解答","note":"影響專案成敗最直接的是專案成員的專案管理能力,和組織專案管理制度的 成熟度。"},{"id":"IPMA-CH01-012","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"12","question":"執行專案所涉及的環境不包含?","options":[{"letter":"A","text":"文化環境"},{"letter":"B","text":"經濟環境"},{"letter":"C","text":"生態環境"},{"letter":"D","text":"政治環境"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 經濟環境","answerSource":"原檔解答","note":"執行專案的外在大環境,包括生態環境、文化環境、社會環境、政治環境、 國際環境、和產業環境等,這些巨觀的環境不但引發專案的需求,而且限制 專案的運作。"},{"id":"IPMA-CH01-013","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"13","question":"下列何者不是構成專案目標的五大要件?","options":[{"letter":"A","text":"明確"},{"letter":"B","text":"可衡量"},{"letter":"C","text":"可達成"},{"letter":"D","text":"無期限"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 無期限","answerSource":"原檔解答","note":"專案目標必須是滿足明確(specific)、可衡量(measurable)、可達成(achievable)、 實際(realistic)、而且是有期限(time-bound)等五大要件。"},{"id":"IPMA-CH01-014","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"14","question":"專案授權書是由誰制定?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"部門主管"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案發起人","answerSource":"原檔解答","note":"專案發起人(project sponsor)負責制定專案授權書(project charter)做為組織高 層和專案團隊間的窗口人。"},{"id":"IPMA-CH01-015","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"15","question":"專案最終的成敗由誰負責?","options":[{"letter":"A","text":"專案經理"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"部門主管"},{"letter":"D","text":"老闆"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案經理","answerSource":"原檔解答","note":"專案經理管理能力會決定專案成功,專案經理能力的好壞會影響70%專案的 成敗。"},{"id":"IPMA-CH01-016","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"16","question":"專案經理最重要具備的能力為何?","options":[{"letter":"A","text":"溝通能力"},{"letter":"B","text":"談判能力"},{"letter":"C","text":"分析能力"},{"letter":"D","text":"反應能力"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 溝通能力","answerSource":"原檔解答","note":"專案經理最重要具備的是溝通能力。"},{"id":"IPMA-CH01-017","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"17","question":"有效管理專案的溝通主要參與人員為?","options":[{"letter":"A","text":"老闆與專案經理"},{"letter":"B","text":"專案經理與專案發起人"},{"letter":"C","text":"專案經理與部門經理"},{"letter":"D","text":"老闆與專案發起人"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案經理與專案發起人","answerSource":"原檔解答","note":"有效管理專案的溝通人員為專案經理與專案發起人。"},{"id":"IPMA-CH01-018","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"18","question":"下列何者為專案管理的過程?","options":[{"letter":"A","text":"規劃Æ發起Æ執行Æ控制"},{"letter":"B","text":"執行Æ控制Æ發起Æ規劃"},{"letter":"C","text":"發起Æ規劃Æ執行Æ控制"},{"letter":"D","text":"規劃Æ執行Æ發起Æ控制"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 發起Æ規劃Æ執行Æ控制","answerSource":"原檔解答","note":"專案管理的五大程序:發起過程Æ規劃過程Æ執行過程Æ控制過程Æ結束過 程。"},{"id":"IPMA-CH01-019","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"19","question":"制訂出專案草案是專案管理過程中的哪一個步驟?","options":[{"letter":"A","text":"發起"},{"letter":"B","text":"規劃"},{"letter":"C","text":"執行"},{"letter":"D","text":"控制"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 發起","answerSource":"原檔解答","note":"專案管理發起的過程,會先輸入專案的需求等相關資訊,決定專案要做什麼 之後,會擬訂專案草案,之後使用專案草案去做規劃。"},{"id":"IPMA-CH01-020","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"20","question":"執行專案最終須交付成果的條件為何?","options":[{"letter":"A","text":"需得到有形的成果或具有無形的成效"},{"letter":"B","text":"需可驗證並得到無形的成效"},{"letter":"C","text":"需可驗證並得到有形的成果"},{"letter":"D","text":"以上皆是"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 需可驗證並得到有形的成果","answerSource":"原檔解答","note":"執行專案計劃後,經過執行工作、監控績效、進度報告及管理變更等程序後, 最終可交付的成果應具備的條件為有形的與可驗證的。"},{"id":"IPMA-CH01-021","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"21","question":"撰寫計畫書是專案管理程序中的哪一個步驟?","options":[{"letter":"A","text":"發起過程"},{"letter":"B","text":"規劃過程"},{"letter":"C","text":"執行過程"},{"letter":"D","text":"控制過程"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 規劃過程","answerSource":"原檔解答","note":"計劃書是在專案管理五大程序中的規劃過程制定出的。"},{"id":"IPMA-CH01-022","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"22","question":"何謂組織由狀態A 到狀態B 的過程?","options":[{"letter":"A","text":"環境管理"},{"letter":"B","text":"決策管理"},{"letter":"C","text":"專案管理"},{"letter":"D","text":"經營管理"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案管理","answerSource":"原檔解答","note":"組織由一個狀態提升到另外一個狀態的過程,都可以應用專案管理的手法來 完成。"},{"id":"IPMA-CH01-023","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"23","question":"專案管理過程中的狀態A 與狀態B 分別代表什麼?","options":[{"letter":"A","text":"機會與創新"},{"letter":"B","text":"問題與目標"},{"letter":"C","text":"目標與獲利"},{"letter":"D","text":"目標與改善"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 問題與目標","answerSource":"原檔解答","note":"專案來自於創新,其目的在於解決組織的問題與創造機會,經由專案管理過 程來達成組織的目標。"},{"id":"IPMA-CH01-024","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"24","question":"何謂「Program」?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"大型專案"},{"letter":"C","text":"大型專案管理"},{"letter":"D","text":"組合管理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 大型專案","answerSource":"原檔解答","note":"「Program」=大型專案"},{"id":"IPMA-CH01-025","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"25","question":"十大建設屬於?","options":[{"letter":"A","text":"專案管理"},{"letter":"B","text":"大型專案管理"},{"letter":"C","text":"專案組合管理"},{"letter":"D","text":"以上皆非"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案組合管理","answerSource":"原檔解答","note":"十大建設屬於專案組合管理。彼此間部一定有直接關連性。"},{"id":"IPMA-CH01-026","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"26","question":"何謂「Project Sponsor」?","options":[{"letter":"A","text":"專案經理人"},{"letter":"B","text":"專案發起人"},{"letter":"C","text":"專案關係人"},{"letter":"D","text":"部門主管"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案發起人","answerSource":"原檔解答","note":"「Project Sponsor」=專案發起人"},{"id":"IPMA-CH01-027","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"27","question":"有關專案團隊何者有誤?","options":[{"letter":"A","text":"計劃階段,等待專案經理制定計劃書"},{"letter":"B","text":"執行階段,要各自完成自己的工作"},{"letter":"C","text":"控制階段,要接受績效的管理審查"},{"letter":"D","text":"結束階段,要整理文件並提供經驗和教訓"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 計劃階段,等待專案經理制定計劃書","answerSource":"原檔解答","note":"專案團隊(project team)是實際負責專案執行的所有成員,在計劃階段,要協 助專案經理制訂專案計畫書;執行階段,要各自完成自己的工作;控制階段, 要接受績效的管理審查;結束階段,要整理文件並提供經驗和教訓。"},{"id":"IPMA-CH01-028","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"28","question":"專案目標的五大要件,除了明確和有期限外還有?.","options":[{"letter":"A","text":"範圍、可衡量、可達成"},{"letter":"B","text":"實際、品質、範圍"},{"letter":"C","text":"可衡量、可達成、實際"},{"letter":"D","text":"成本、品質、範圍"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 可衡量、可達成、實際","answerSource":"原檔解答","note":"專案目標的五大要件是,明確(specific)、可衡量(measurable)、可達成 (achievable)、實際(realistic)、有期限(time-bound)。"},{"id":"IPMA-CH01-029","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"29","question":"可行性分析是專案管理程序中的哪一個步驟?","options":[{"letter":"A","text":"發起過程"},{"letter":"B","text":"規劃過程"},{"letter":"C","text":"執行過程"},{"letter":"D","text":"控制過程"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 發起過程","answerSource":"原檔解答","note":"專案在發起過程中,會先進行專案的可行性分析,若評估可行,專案才可發 起。"},{"id":"IPMA-CH01-030","category":"IPMA自我評量","source":"Chapter 1 專案概念.pdf","section":"Chapter 1","originalNo":"30","question":"下列何者不屬於專案管理的九大知識領域?","options":[{"letter":"A","text":"專案範疇管理"},{"letter":"B","text":"專案品質管理"},{"letter":"C","text":"專案環境管理"},{"letter":"D","text":"專案溝通管理"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案環境管理","answerSource":"原檔解答","note":"專案管理九大知識領域包括:(1)專案整合管理(2)專案範疇管理(3)專案時間管 理(4)專案成本管理(5)專案品質管理(6)專案人力資源管理(7)專案溝通管理(8) 專案風險管理(9)專案採購管理。"},{"id":"IPMA-CH10-001","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"1","question":"何謂大型專案?","options":[{"letter":"A","text":"是指在一組織綜合投資報酬率最大的專案,稱大型專案。"},{"letter":"B","text":"是指在一個共同目標之下,管理一群彼此互相關聯的專案。"},{"letter":"C","text":"是指在一個專案中,管理大型目標的專案。"},{"letter":"D","text":"是指在一個共同目標之中,管理主要大型目標專案的一種。"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 是指在一個共同目標之下,管理一群彼此互相關聯的專案。","answerSource":"原檔解答","note":"大型專案管理(program management) 是指在一個共同目標之下,管理一群彼 此互相關聯的專案。"},{"id":"IPMA-CH10-002","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"2","question":"何者適合使用大型專案?","options":[{"letter":"A","text":"研發北極星飛彈計畫"},{"letter":"B","text":"高速鐵路"},{"letter":"C","text":"奧林匹克運動會"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"研發北極星飛彈計畫高速鐵路奧林匹克運動會都是屬於大型專案。"},{"id":"IPMA-CH10-003","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"3","question":"就專案與大型專案而言,哪些是不相同的?","options":[{"letter":"A","text":"規模的大小"},{"letter":"B","text":"為一次性活動"},{"letter":"C","text":"受時間限制"},{"letter":"D","text":"有開始與結束"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 規模的大小","answerSource":"原檔解答","note":"因專案規模較大型專案小。"},{"id":"IPMA-CH10-004","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"4","question":"請問大型專案的管理架構沒有哪項流程?","options":[{"letter":"A","text":"控制"},{"letter":"B","text":"執行"},{"letter":"C","text":"討論"},{"letter":"D","text":"結束"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 討論","answerSource":"原檔解答","note":"因流程從發起、規劃、執行、控制、結束等架構形成。"},{"id":"IPMA-CH10-005","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"5","question":"大型專案的管理者為?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案副總"},{"letter":"C","text":"部門經理"},{"letter":"D","text":"專案關係人"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案副總","answerSource":"原檔解答","note":"負責大型專案的管理者稱為大型專案經理或稱專案副總。"},{"id":"IPMA-CH10-006","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"6","question":"北京奧運大型專案和節目設計專案的關係為何?","options":[{"letter":"A","text":"為各自獨立沒有關係"},{"letter":"B","text":"為競爭的關係"},{"letter":"C","text":"為平等目標的關係"},{"letter":"D","text":"為互相共存的關係"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 為互相共存的關係","answerSource":"原檔解答","note":"因北京奧運大型專案又分許多小型專案節目設計專案是其中的一個目標。"},{"id":"IPMA-CH10-007","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"7","question":"就一個人類登陸月球的大型專案中,哪一個項目不是它的專案?","options":[{"letter":"A","text":"登陸車"},{"letter":"B","text":"發射器"},{"letter":"C","text":"控制系統"},{"letter":"D","text":"以上皆非"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆非","answerSource":"原檔解答","note":"登陸車發射器控制系統都是屬於登入月球的大型專案中的小專案。"},{"id":"IPMA-CH10-008","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"8","question":"何謂在一共同目標下,管理一群彼此互相關聯的專案?","options":[{"letter":"A","text":"小型專案管理"},{"letter":"B","text":"中型專案管理"},{"letter":"C","text":"大型專案管理"},{"letter":"D","text":"中小型專案管理"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 大型專案管理","answerSource":"原檔解答","note":"大型專案管理是指在一個共同目標下,管理一群彼此互相關聯的專案。"},{"id":"IPMA-CH10-009","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"9","question":"負責大型專案的管理者是","options":[{"letter":"A","text":"專案總裁"},{"letter":"B","text":"大型專案經理"},{"letter":"C","text":"專案董事長"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 大型專案經理","answerSource":"原檔解答","note":"負責大型專案的管理者稱為大型專案經理,或稱為專案副總。"},{"id":"IPMA-CH10-010","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"10","question":"何者為人類登陸月球包含的專案?","options":[{"letter":"A","text":"登陸車"},{"letter":"B","text":"發射器"},{"letter":"C","text":"控制系統"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"登陸車發射器控制系統都是屬於登入月球的大型專案中的小專案。"},{"id":"IPMA-CH10-011","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"11","question":"何者為高速鐵路的建造包括的專案?","options":[{"letter":"A","text":"土地的徵收"},{"letter":"B","text":"系統的設計"},{"letter":"C","text":"土木營建"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"高速鐵路的建造專案包括土地的徵收系統的設計土木營建等專案。"},{"id":"IPMA-CH10-012","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"12","question":"何者為奧林匹克運動會所涵蓋的專案?","options":[{"letter":"A","text":"運動場所的設計"},{"letter":"B","text":"廣告宣傳"},{"letter":"C","text":"後勤支援"},{"letter":"D","text":"以上皆是"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 以上皆是","answerSource":"原檔解答","note":"奧林匹克運動會所涵蓋的專案有運動場的設計廣告宣傳後勤支援等專案。"},{"id":"IPMA-CH10-013","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"13","question":"專案副總是負責什麼的管理者?","options":[{"letter":"A","text":"小型專案"},{"letter":"B","text":"中型專案"},{"letter":"C","text":"大型專案"},{"letter":"D","text":"中小型專案"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 大型專案","answerSource":"原檔解答","note":"專案副總或大型專案經理是負責管理大型專案"},{"id":"IPMA-CH10-014","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"14","question":"大型專案管理(program management)的定義是下列哪一解釋?","options":[{"letter":"A","text":"是指在一個共同的目標之下,管理一群彼此互相關聯的專案。"},{"letter":"B","text":"組織在同一個時間內需要執行好幾個專案的機會非常高,選擇一組對組織 粽何投資報酬率高\\最大的專案組合。"},{"letter":"C","text":"專案團隊在組織預設的限制條件下,力用有效的管理方法與工具,以有限 的資源達成組織的策略性目標。"},{"letter":"D","text":"一群彼此相關而且必須協調運作的專案,完成後達成組織的既定策略性目 標。"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 是指在一個共同的目標之下,管理一群彼此互相關聯的專案。","answerSource":"原檔解答","note":"因大型專案管理是一群彼此相關且必須協調運作的專案,完成後會達成組織 既定策略性的目標。 15. 答案:C 負責大型專案的人稱為大型專案經理或專案副總。"},{"id":"IPMA-CH10-016","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"16","question":"高速鐵路的建造是一個大型專案,包括的專案有土地的徵收、系統設計、土 木營造、機電整合、車輛設計建造等等,那下列選項中,何者也是大型專案 的例子?","options":[{"letter":"A","text":"機車展"},{"letter":"B","text":"奧運會"},{"letter":"C","text":"慶生會"},{"letter":"D","text":"路跑比賽"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 奧運會","answerSource":"原檔解答","note":"奧運會是一個大型專案需要許多小型專案達成目標。"},{"id":"IPMA-CH10-017","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"17","question":"大型專案經理的定義是以下何者?","options":[{"letter":"A","text":"負責監督及協助某一專案的高階主管"},{"letter":"B","text":"從專案發起到結束,所有和專案有關或是會受專案成功或失敗而影響其利 益的人"},{"letter":"C","text":"管理一個大型專案或是管理一組彼此相關的專案"},{"letter":"D","text":"專案完成後,負責專案產品後續運作的人"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 管理一個大型專案或是管理一組彼此相關的專案","answerSource":"原檔解答","note":"大型專案經理是管理一個大型專案或是管理一組彼此相關的專案。"},{"id":"IPMA-CH10-018","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"18","question":"專案副總又稱為何者?","options":[{"letter":"A","text":"專案關係人"},{"letter":"B","text":"大型專案經理"},{"letter":"C","text":"專案經理"},{"letter":"D","text":"專案發起人"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 大型專案經理","answerSource":"原檔解答","note":"專案副總和大型專案經理都是負責大型專案的管理者。"},{"id":"IPMA-CH10-019","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"19","question":"奧林匹克運動會是大型專案的活例,所涵蓋的專案有運動廠所的設計建設、 選手村的設計建造、廣告宣傳、後勤支援、節目設計、安全維護、比賽時程 安排控制等,那下列何者也為大型專案的例子?","options":[{"letter":"A","text":"大胃王比賽"},{"letter":"B","text":"高速鐵路"},{"letter":"C","text":"同學會"},{"letter":"D","text":"以上皆是"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 高速鐵路","answerSource":"原檔解答","note":"高速鐵路也是屬於大型專案的一種。"},{"id":"IPMA-CH10-020","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"20","question":"組織內最主要的大型專案或專案監督單位為?","options":[{"letter":"A","text":"小組負責人"},{"letter":"B","text":"專案推動委員會"},{"letter":"C","text":"專案客戶"},{"letter":"D","text":"部門經理"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案推動委員會","answerSource":"原檔解答","note":"大型專案或專案推動委員會是組之內最重要的大型專案或專案監督單位。"},{"id":"IPMA-CH10-021","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"21","question":"下列何者適合大型專案?","options":[{"letter":"A","text":"戰術型PMO"},{"letter":"B","text":"企業型PMO"},{"letter":"C","text":"跨部門PMO"},{"letter":"D","text":"策略型PMO"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 跨部門PMO","answerSource":"原檔解答","note":"跨部門PMO(cross-functional PMO)適合中大型專案,主要職責是確保各部門 的充分參與以及維持部門關係和職責的透明度。"},{"id":"IPMA-CH10-022","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"22","question":"大型專案可分為幾個目標?","options":[{"letter":"A","text":"一個"},{"letter":"B","text":"兩個"},{"letter":"C","text":"無限多個"},{"letter":"D","text":"都有可能"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 都有可能","answerSource":"原檔解答","note":"大型專案的專案項目都是隨目標而有所改變,所以不一定侷限於專案目標的 次數。"},{"id":"IPMA-CH10-023","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"23","question":"哪一個階段的角色是監督大型專案的進行?","options":[{"letter":"A","text":"專案發起"},{"letter":"B","text":"專案規劃"},{"letter":"C","text":"專案執行"},{"letter":"D","text":"專案控制"}],"answerLetters":["C"],"answerRaw":"C","answerText":"C. 專案執行","answerSource":"原檔解答","note":"專案執行是監督大型專案的進行和審查大型專案的狀態及進度報告。"},{"id":"IPMA-CH10-024","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"24","question":"哪一個階段的角色審核大型專案的概念書?","options":[{"letter":"A","text":"專案發起"},{"letter":"B","text":"專案規劃"},{"letter":"C","text":"專案執行"},{"letter":"D","text":"專案控制"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案發起","answerSource":"原檔解答","note":"專案發起的階段角色會審核大型專案的概念書。"},{"id":"IPMA-CH10-025","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"25","question":"大型專案是由哪一個進行監督和協調?","options":[{"letter":"A","text":"專案發起人"},{"letter":"B","text":"專案經理"},{"letter":"C","text":"高階管理層"},{"letter":"D","text":"專案主要成員"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案發起人","answerSource":"原檔解答","note":"大型專案底下可能有好幾個彼此相關的專案,每個專案則由一個專案發起人 進行監督和協助。"},{"id":"IPMA-CH10-026","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"26","question":"終止績效不良的大型專案是哪一個階段的角色?","options":[{"letter":"A","text":"專案發起"},{"letter":"B","text":"專案控制"},{"letter":"C","text":"專案執行"},{"letter":"D","text":"專案規劃"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案控制","answerSource":"原檔解答","note":"專案控制裡的角色是終止績效不良的大型專案。"},{"id":"IPMA-CH10-027","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"27","question":"管理好大型專案或專案所需要的共通部分?","options":[{"letter":"A","text":"團隊"},{"letter":"B","text":"制度"},{"letter":"C","text":"資源"},{"letter":"D","text":"方法"},{"letter":"E","text":"以上皆是"}],"answerLetters":["E"],"answerRaw":"E","answerText":"E. 以上皆是","answerSource":"原檔解答","note":"專案與大型專案共通的部份有團隊制度資源方法的階段。"},{"id":"IPMA-CH10-028","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"28","question":"建構何種方法可提高大型專案的管理效率?","options":[{"letter":"A","text":"電腦化"},{"letter":"B","text":"制度化"},{"letter":"C","text":"資訊化"},{"letter":"D","text":"知識化"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 電腦化","answerSource":"原檔解答","note":"因為組織的國際化和競爭的全球化建構了一套電腦化大型專案管理資訊系 統,有了這樣的網路系統,組織更可以更有效率的執行大型專案。"},{"id":"IPMA-CH10-029","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"29","question":"何者是大型專案的執行績效、變更要求和階段決策的控管中心?","options":[{"letter":"A","text":"專案管理辦公室"},{"letter":"B","text":"專案管理委員會"},{"letter":"C","text":"專案管理的知識庫"},{"letter":"D","text":"執行專案的組織"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 專案管理委員會","answerSource":"原檔解答","note":"大型專案管理委員會是高階管理層。"},{"id":"IPMA-CH10-030","category":"IPMA自我評量","source":"Chapter 10 大型專案管理.pdf","section":"Chapter 10","originalNo":"30","question":"如果某種組織變革的幅度,大到必須拆成好幾個專案時,這時候的變革提升 就變成一個?","options":[{"letter":"A","text":"工作包"},{"letter":"B","text":"大型專案"},{"letter":"C","text":"SOP"},{"letter":"D","text":"專案辦公室"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 大型專案","answerSource":"原檔解答","note":"大型專案是由許多小型專案所組成的。"},{"id":"IPMA-CH11-001","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"1","question":"你是一個環境評估專案的專案經理,你應該如何進行?","options":[{"letter":"A","text":"依客戶需求做出結論"},{"letter":"B","text":"依專業知識做出結論"},{"letter":"C","text":"依社會期待做出結論"},{"letter":"D","text":"以上皆非"}],"answerLetters":["B"],"answerRaw":"B","answerText":"B. 依專業知識做出結論","answerSource":"原檔解答","note":"身為一個環境評估專案的專案經理,要依專業知識做出結論。"},{"id":"IPMA-CH11-002","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"2","question":"確認出對組織策略目標具有潛在加值效果的所有專案是什麼?","options":[{"letter":"A","text":"專案篩選"},{"letter":"B","text":"專案執行"},{"letter":"C","text":"專案排名"},{"letter":"D","text":"專案核准"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 專案篩選","answerSource":"原檔解答","note":"專案篩選:確認出對組織策略目標具有潛在加值效果的所有專案。 專案執行:對專案組合的每個內容專案,進行進度排程和預算編列的動作。 專案排名:審查每個專案的專案原由,然後以專業的貢獻度及急迫性排出執 行順序。 專案核准:依照專案排名順序及組織資源限制,核准在未來一段時間內,組 織應該優先執行的專案組合。"},{"id":"IPMA-CH11-003","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"3","question":"依照專案排名順序及組織資源限制,核准在未來一段時間內,組織應該優先 執行的專案組合是什麼?","options":[{"letter":"A","text":"專案篩選"},{"letter":"B","text":"專案執行"},{"letter":"C","text":"專案排名"},{"letter":"D","text":"專案核准"}],"answerLetters":["D"],"answerRaw":"D","answerText":"D. 專案核准","answerSource":"原檔解答","note":"專案篩選:確認出對組織策略目標具有潛在加值效果的所有專案。 專案執行:對專案組合的每個內容專案,進行進度排程和預算編列的動作。 專案排名:審查每個專案的專案原由,然後以專業的貢獻度及急迫性排出執 行順序。 專案核准:依照專案排名順序及組織資源限制,核准在未來一段時間內,組 織應該優先執行的專案組合。"},{"id":"IPMA-CH11-004","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"4","question":"請問PEST 分析的P 是指什麼意思?","options":[{"letter":"A","text":"政治(political)"},{"letter":"B","text":"專案(project)"},{"letter":"C","text":"規劃(planning)"},{"letter":"D","text":"執行(program)"}],"answerLetters":["A"],"answerRaw":"A","answerText":"A. 政治(political)","answerSource":"原檔解答","note":"PEST 分析中,P 是指政治(political)、E 是指經濟(economic) 、S 是指社會 (social),T 是指技術(technological)。"},{"id":"IPMA-CH11-005","category":"IPMA自我評量","source":"Chapter 11 專案組合管理.pdf","section":"Chapter 11","originalNo":"5","question":"
